<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaches Dashboard — Dual Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f3f4f7;
  --bg2:      #ecedf1;
  --bg3:      #e4e5ea;
  --surface:  #ffffff;
  --surface2: #f8f8fb;
  --surface3: #f0f1f5;
  --border:   rgba(0,0,0,.07);
  --border-mid: rgba(0,0,0,.13);
  --text:     #111118;
  --muted:    #5a6070;
  --dim:      #9ba3b0;
  --run:      #e05f00;
  --run-dim:  rgba(224,95,0,.09);
  --run-mid:  rgba(224,95,0,.18);
  --str:      #4f46e5;
  --str-dim:  rgba(79,70,229,.09);
  --str-mid:  rgba(79,70,229,.18);
  --ok:       #15803d;
  --ok-dim:   rgba(21,128,61,.08);
  --ok-mid:   rgba(21,128,61,.18);
  --warn:     #b45309;
  --warn-dim: rgba(180,83,9,.08);
  --warn-mid: rgba(180,83,9,.18);
  --alert:    #b91c1c;
  --alert-dim:rgba(185,28,28,.07);
  --alert-mid:rgba(185,28,28,.18);
  --info:     #0369a1;
  --win-bg:   rgba(21,128,61,.07);
  --win-border:rgba(21,128,61,.2);
  --win-text: #15803d;
  --flag-bg:  rgba(185,28,28,.07);
  --flag-border:rgba(185,28,28,.2);
  --flag-text:#b91c1c;
  --mono: 'JetBrains Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --body-font:'Barlow', sans-serif;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body-font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* ── Header ── */
header {
  background: rgba(255,255,255,.92);
  border-bottom: 1px solid var(--border);
  padding: 0 22px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  gap: 14px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 1px 0 rgba(0,0,0,.06);
}
.logo {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: .14em;
  text-transform: uppercase;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
  user-select: none;
}
.logo .d { color: var(--text); }
.logo .sep { color: var(--bg3); font-weight: 400; margin: 0 5px; }
.logo .p { color: var(--dim); }
.h-mid {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .16em;
  white-space: nowrap;
}
.h-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.updated {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  white-space: nowrap;
}
.btn {
  background: var(--surface);
  border: 1px solid var(--border-mid);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: .07em;
  transition: all .15s;
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.btn:hover { border-color: var(--str); color: var(--str); background: var(--str-dim); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.primary {
  background: var(--str);
  border-color: var(--str);
  color: #fff;
  box-shadow: 0 1px 3px rgba(79,70,229,.3);
}
.btn.primary:hover { background: #4338ca; border-color: #4338ca; color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.35); }
.btn.loading {
  background: var(--str-dim);
  border-color: var(--str);
  color: var(--str);
  animation: pulse-btn 1.4s infinite;
}
@keyframes pulse-btn {
  0%,100% { box-shadow: 0 0 0 0 rgba(79,70,229,.2); }
  50%      { box-shadow: 0 0 0 4px rgba(79,70,229,.1); }
}

/* ── Layout ── */
.main {
  padding: 20px 18px 80px;
  max-width: 1540px;
  margin: 0 auto;
}

/* ── Loading / Error ── */
.state-box { text-align: center; padding: 100px 20px; }
.dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg3); animation: blink 1.4s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }
.state-txt {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .1em;
}

/* ── Summary Bar ── */
.summary-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 18px;
  flex: 1;
  min-width: 88px;
  max-width: 160px;
  box-shadow: var(--shadow);
  transition: box-shadow .15s, transform .15s;
}
.sum-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.sum-num {
  font-family: var(--cond);
  font-size: 32px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 3px;
  letter-spacing: -.01em;
}
.sum-num.default { color: var(--text); }
.sum-num.red   { color: var(--alert); }
.sum-num.grn   { color: var(--ok); }
.sum-num.run-c { color: var(--run); }
.sum-num.str-c { color: var(--str); }
.sum-num.warn-c{ color: var(--warn); }
.sum-lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .1em;
}

/* ── Week Summary Banner ── */
.week-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 18px;
  display: none;
  box-shadow: var(--shadow);
}
.week-summary.visible { display: block; }
.ws-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.ws-title {
  font-family: var(--cond);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ws-title strong { color: var(--str); font-weight: 900; }
.ws-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 700px) { .ws-cols { grid-template-columns: 1fr; } }
.ws-col { display: flex; flex-direction: column; gap: 6px; }
.ws-col-ttl {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.ws-win {
  background: rgba(21,128,61,.06);
  border: 1px solid rgba(21,128,61,.18);
  border-left: 3px solid var(--ok);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12.5px;
  color: #1a6b3a;
  line-height: 1.45;
}
.ws-win strong { font-weight: 700; color: #0f5c30; }
.ws-flag {
  background: rgba(185,28,28,.05);
  border: 1px solid rgba(185,28,28,.15);
  border-left: 3px solid var(--alert);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12.5px;
  color: #9b1515;
  line-height: 1.45;
}
.ws-flag strong { font-weight: 700; color: #7f1010; }
.ws-flag.soft {
  background: rgba(180,83,9,.05);
  border-color: rgba(180,83,9,.15);
  border-left-color: var(--warn);
  color: #92400e;
}
.ws-flag.soft strong { color: #78350f; }
.ws-ai-text {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.65;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: none;
}

/* ── Section Divider ── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0 14px;
}
.sd-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .14em;
  white-space: nowrap;
}
.sd-line { flex: 1; height: 1px; background: var(--border); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
  align-items: start;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, transform .2s;
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card.red {
  border-color: rgba(185,28,28,.25);
  box-shadow: 0 0 0 3px rgba(185,28,28,.06), var(--shadow);
}
.card.yellow {
  border-color: rgba(180,83,9,.22);
  box-shadow: 0 0 0 3px rgba(180,83,9,.05), var(--shadow);
}

/* ── Card Header ── */
.card-head {
  background: linear-gradient(135deg, var(--surface2) 0%, var(--bg2) 100%);
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.card.red  .card-head { background: linear-gradient(135deg, rgba(185,28,28,.05) 0%, rgba(185,28,28,.02) 100%); }
.card.yellow .card-head { background: linear-gradient(135deg, rgba(180,83,9,.05) 0%, rgba(180,83,9,.02) 100%); }
.card-head-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 9px;
}
.aname {
  font-family: var(--cond);
  font-size: 28px;
  font-weight: 900;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}
.ameta {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-top: 5px;
}
.ameta.nocheckin { color: var(--alert); }
.week-badge {
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  padding: 5px 14px;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.wk-num {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  letter-spacing: -.01em;
}
.wk-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-top: 2px;
}

/* ── Flags ── */
.flags { display: flex; flex-wrap: wrap; gap: 4px; }
.fp {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 9px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: .05em;
  font-weight: 600;
}
.fp.red    { background: rgba(185,28,28,.1);  color: var(--alert); border: 1px solid rgba(185,28,28,.2); }
.fp.yellow { background: rgba(180,83,9,.1);   color: var(--warn);  border: 1px solid rgba(180,83,9,.2); }
.fp.green  { background: rgba(21,128,61,.1);  color: var(--ok);    border: 1px solid rgba(21,128,61,.2); }
.fp.blue   { background: rgba(3,105,161,.09); color: var(--info);  border: 1px solid rgba(3,105,161,.2); }

/* ── Scores Row ── */
.scores {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.sc {
  flex: 1;
  padding: 8px 3px;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
}
.sc:last-child { border-right: none; }
.sc-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}
.sc-val {
  font-family: var(--cond);
  font-size: 21px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.01em;
}
.sc-val.good { color: var(--ok); }
.sc-val.mid  { color: var(--warn); }
.sc-val.bad  { color: var(--alert); }
.sc-val.n    { color: var(--dim); }
.sc-trend { font-family: var(--mono); font-size: 8px; position: absolute; top: 6px; right: 4px; }
.sc-trend.up { color: var(--ok); }
.sc-trend.dn { color: var(--alert); }

/* ── Sections ── */
.sec {
  padding: 12px 15px;
  border-bottom: 1px solid var(--border);
}
.sec:last-child { border-bottom: none; }
.sec-ttl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-ttl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sec-ttl-dot.run  { background: var(--run); }
.sec-ttl-dot.str  { background: var(--str); }
.sec-ttl-dot.body { background: var(--info); }
.sec-ttl-dot.nutr { background: var(--ok); }

/* ── Training pair ── */
.tpair { display: flex; gap: 9px; }
.tb {
  flex: 1;
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 11px;
  border: 1px solid var(--border);
}
.tt {
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.tt.run { color: var(--run); }
.tt.str { color: var(--str); }
.tt-icon { font-size: 12px; }
.ts {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  line-height: 1.75;
}
.ts strong  { color: var(--text); font-weight: 600; }
.ts .hi  { color: var(--run); font-weight: 700; }
.ts .his { color: var(--str); font-weight: 700; }

/* ── Progress bar ── */
.pbar {
  height: 4px;
  background: rgba(0,0,0,.07);
  border-radius: 3px;
  overflow: hidden;
  margin: 5px 0;
}
.pfill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.pfill.run  { background: var(--run); }
.pfill.str  { background: var(--str); }
.pfill.full { background: var(--ok); }

/* ── Notes / Niggles / Wins ── */
.nl {
  font-size: 11px;
  line-height: 1.45;
  margin-top: 6px;
  border-radius: 7px;
  padding: 5px 8px;
}
.nl-lbl {
  font-family: var(--mono);
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: .07em;
  display: block;
  margin-bottom: 1px;
  font-weight: 700;
}
.nl.red    { color: var(--alert); background: var(--alert-dim); border-left: 3px solid var(--alert); }
.nl.red .nl-lbl { color: #9b1515; }
.nl.green  { color: var(--ok);    background: var(--ok-dim);    border-left: 3px solid var(--ok); }
.nl.green .nl-lbl { color: #0f5c30; }
.nl.amber  { color: var(--warn);  background: var(--warn-dim);  border-left: 3px solid var(--warn); }
.nl.amber .nl-lbl { color: #92400e; }
.testim {
  font-size: 11.5px;
  color: var(--muted);
  font-style: italic;
  line-height: 1.55;
  padding: 8px 11px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--border-mid);
  margin-top: 8px;
}
.impact {
  font-size: 11px;
  color: var(--warn);
  margin-top: 6px;
  padding: 5px 9px;
  background: var(--warn-dim);
  border-radius: 7px;
  border-left: 3px solid var(--warn);
  font-weight: 600;
}

/* ── Strength Highlights ── */
.str-prs { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.pr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 9px;
  background: rgba(79,70,229,.07);
  border: 1px solid rgba(79,70,229,.15);
  border-radius: 7px;
  gap: 8px;
}
.pr-move {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--str);
  text-transform: uppercase;
  letter-spacing: .04em;
  flex: 1;
  font-weight: 600;
}
.pr-val { font-family: var(--cond); font-size: 16px; font-weight: 800; color: #3730a3; }
.pr-badge {
  font-family: var(--mono);
  font-size: 7px;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .04em;
  font-weight: 700;
}
.pr-badge.pb { background: rgba(202,138,4,.15); color: #92400e; border: 1px solid rgba(202,138,4,.3); }
.pr-badge.strong { background: var(--ok-dim); color: var(--ok); border: 1px solid var(--ok-mid); }

/* ── Body Section ── */
.body-grid { display: flex; align-items: flex-start; gap: 14px; }
.wnum {
  font-family: var(--cond);
  font-size: 32px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -.02em;
  color: var(--text);
}
.wunit { font-family: var(--mono); font-size: 9px; color: var(--dim); margin-left: 2px; }
.wdate { font-family: var(--mono); font-size: 8px; color: var(--dim); margin-top: 2px; }
.bmet { flex: 1; display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.bm { text-align: center; }
.bm-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 3px;
}
.bm-val { font-family: var(--cond); font-size: 20px; font-weight: 700; line-height: 1; }
.bm-val.good { color: var(--ok); }
.bm-val.mid  { color: var(--warn); }
.bm-val.bad  { color: var(--alert); }
.bnote {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  margin-top: 8px;
  border-left: 3px solid var(--alert);
  padding-left: 8px;
  line-height: 1.55;
}

/* ── Nutrition ── */
.nutr-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.mc {
  flex: 1;
  background: var(--surface2);
  border-radius: 9px;
  padding: 8px 9px;
  text-align: center;
  border: 1px solid var(--border);
  min-width: 56px;
}
.mc-lbl { font-family: var(--mono); font-size: 7px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
.mc-val { font-family: var(--cond); font-size: 20px; font-weight: 700; line-height: 1; color: var(--text); }
.mc-unit { font-family: var(--mono); font-size: 8px; color: var(--dim); }
.mc-status { font-family: var(--mono); font-size: 7px; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
.mc-status.over  { color: var(--alert); }
.mc-status.under { color: var(--warn); }
.mc-status.good  { color: var(--ok); }
.mc.highlight   { border-color: rgba(21,128,61,.25); background: rgba(21,128,61,.05); }
.mc.flag-over   { border-color: rgba(185,28,28,.2);  background: rgba(185,28,28,.05); }
.mc.flag-under  { border-color: rgba(180,83,9,.2);   background: rgba(180,83,9,.05); }
.macro-compare { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }

<script>
// ── Database IDs ──────────────────────────────────────────────────────────────
const DB = {
  weekly:    '33e5a96c-c70b-8049-b696-d22e5920e0ee',
  sessions:  '1c55a96c-c70b-825b-9bdf-819abea4ef7c',
  body:      '3405a96c-c70b-80a4-b1b9-cf5b9c236f18',
  nutrition: '3405a96c-c70b-804b-aa9c-f165f2d2e0e9',
  athletes:  '4a25a96c-c70b-82ff-a679-0139eaa8b458',
};
const ALIASES = { 'JACOB TUAZON': 'JACOB' };
const MACRO_TARGETS = {
  // 'ATHLETE_NAME': { cal: 2400, pro: 170, carb: 250, fat: 70 }
};
const DEFAULT_TARGETS = { cal: 2200, pro: 160, carb: 220, fat: 65 };

// ── Reference date — locked to today ─────────────────────────────────────────
const TODAY = new Date('2026-05-02T00:00:00');

// ── Helpers ───────────────────────────────────────────────────────────────────
function nid(s) {
  if (!s) return null;
  const u = s.toUpperCase().trim();
  return ALIASES[u] || u;
}
function sid(r) {
  const code = r['Athlete Code'];
  if (code) return nid(code);
  const name = (r.Name || '').split('—')[0].trim();
  return name ? nid(name) : null;
}
function avg(arr, k) {
  const v = arr.map(r => parseFloat(r[k])).filter(x => !isNaN(x));
  return v.length ? (v.reduce((a, b) => a + b, 0) / v.length).toFixed(1) : null;
}
function dago(n) { const d = new Date(TODAY); d.setDate(d.getDate() - n); return d; }
function scoreClass(v, inv) {
  const n = parseFloat(v);
  if (isNaN(n)) return 'n';
  if (inv) return n >= 8 ? 'bad' : n >= 6 ? 'mid' : 'good';
  return n >= 7.5 ? 'good' : n >= 5 ? 'mid' : 'bad';
}
function bmClass(lbl, v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  const inv = ['stress','sore','soreness'].includes(lbl.toLowerCase());
  if (inv) return n >= 8 ? 'bad' : n >= 6 ? 'mid' : 'good';
  return n >= 7.5 ? 'good' : n >= 5 ? 'mid' : 'bad';
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = String(s).split('T')[0].split('-');
  if (!y || !m || !d) return s;
  return `${d}-${m}-${y}`;
}
function pct(v, t) {
  if (!v || !t) return 0;
  return Math.min(120, Math.round((parseFloat(v) / parseFloat(t)) * 100));
}
function macroStatus(v, t) {
  if (!v || !t) return '';
  const p = parseFloat(v) / parseFloat(t);
  if (p > 1.12) return 'over';
  if (p < 0.88) return 'under';
  return 'good';
}
function macroStatusLabel(v, t) {
  if (!v || !t) return '';
  const p = parseFloat(v) / parseFloat(t);
  if (p > 1.12) return `+${Math.round((p-1)*100)}%`;
  if (p < 0.88) return `-${Math.round((1-p)*100)}%`;
  return 'On Target';
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchDB(dbId) {
  const res = await fetch(`/api/notion?db=${dbId}`);
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
  const data = await res.json();
  return data.results || [];
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  document.getElementById('refresh-btn').disabled = true;
  try {
    const [weekly, sessions, body, nutrition, athleteDb] = await Promise.all([
      fetchDB(DB.weekly), fetchDB(DB.sessions), fetchDB(DB.body),
      fetchDB(DB.nutrition), fetchDB(DB.athletes),
    ]);
    const athletes = buildAthletes(weekly, sessions, body, nutrition, athleteDb);
    _lastAthletes = athletes;
    render(athletes);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('updated').textContent =
      '02 May 2026 · ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err-msg').textContent = 'Error: ' + e.message;
  } finally {
    document.getElementById('refresh-btn').disabled = false;
  }
}

// ── Build Athletes ─────────────────────────────────────────────────────────────
function buildAthletes(weekly, sessions, body, nutrition, athleteDb = []) {
  const c14 = dago(14), c7 = dago(7);
  const map = {};
  function ens(id) {
    if (!id || id.length < 2) return;
    if (!map[id]) map[id] = { id, weekly: null, body: [], nutrition: [], sessions: [] };
  }
  const startDates = {};
  athleteDb.forEach(r => {
    const code = nid(r.Code || r.Athlete);
    const sd = r['date:Start Date:start'] || r['Start Date'];
    if (code && sd) startDates[code] = sd;
  });
  const WEEK_OVERRIDES = { 'KARL': 7, 'JACOB': 7, 'KHANG': 7 };
  function calcWeekNum(id) {
    if (WEEK_OVERRIDES.hasOwnProperty(id)) return WEEK_OVERRIDES[id];
    const sd = startDates[id];
    if (!sd) return null;
    const diffDays = Math.floor((TODAY.getTime() - new Date(sd)) / 86400000);
    return Math.max(0, Math.floor(diffDays / 7));
  }
  const wAll = {};
  weekly.forEach(r => {
    const id = nid(r.Name);
    if (!id || !r['Week Ending']) return;
    if (!wAll[id]) wAll[id] = [];
    wAll[id].push(r);
  });
  Object.entries(wAll).forEach(([id, records]) => {
    const sorted = records.sort((a, b) => (b['Week Ending'] > a['Week Ending'] ? 1 : -1));
    ens(id);
    map[id].weekly = sorted[0] || null;
    map[id].weeklyPrev = sorted[1] || null;
  });
  body.forEach(r => {
    const id = nid(r.AthleteID); if (!id) return; ens(id);
    const d = r['date:Date:start'] || r.Date;
    if (d && new Date(d) >= c14) map[id].body.push(r);
  });
  nutrition.forEach(r => {
    const id = nid(r.AthleteID); if (!id) return; ens(id);
    const d = r['date:Date:start'] || r.Date;
    if (d && new Date(d) >= c14) map[id].nutrition.push(r);
  });
  const seen = new Set();
  sessions.forEach(r => {
    const id = sid(r);
    if (!id || !map[id]) return;
    const ds = ((r.Date || r['Submitted At'] || r._createdTime || '')).split('T')[0];
    if (!ds || new Date(ds) < c14) return;
    const k = `${id}|${r.Session || ''}|${r['Session Category'] || ''}|${ds}`;
    if (!seen.has(k)) { seen.add(k); map[id].sessions.push({ ...r, _d: ds }); }
  });

  // THIS WEEK = week ending date falls within the last 7 days of TODAY
  const thisWeekCutoff = dago(7).toISOString().split('T')[0];

  return Object.values(map).map(a => {
    // ── Only use weekly check-in if it belongs to THIS week ──
    const wkEnd = a.weekly?.['Week Ending'] || '';
    const hasRecent = !!wkEnd && wkEnd >= thisWeekCutoff;
    // Expose the current week's record only if it's recent; otherwise null it out for display
    const weeklyThisWeek = hasRecent ? a.weekly : null;

    // ── Body: this-week only (7 days). Weight: most recent within 7 days only ──
    const b7 = a.body.filter(r => new Date(r['date:Date:start'] || r.Date) >= c7);
    const b7sorted = [...b7].sort((x, y) =>
      (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1);
    const bLastThisWeek = b7sorted[0]; // undefined if nothing logged this week
    const bAvg = {
      wt:  bLastThisWeek?.Weight,
      wtd: bLastThisWeek?.['date:Date:start'] || bLastThisWeek?.Date,
      sleep:    b7.length ? avg(b7, 'Sleep Score') : null,
      energy:   b7.length ? avg(b7, 'Energy')      : null,
      stress:   b7.length ? avg(b7, 'Stress')       : null,
      soreness: b7.length ? avg(b7, 'Soreness')     : null,
      hasData: b7.length > 0,
    };

    // ── Nutrition: this-week only ──
    const n7 = a.nutrition.filter(r => new Date(r['date:Date:start'] || r.Date) >= c7);
    const nAvg = {
      cal:  n7.length ? avg(n7, 'Calories') : null,
      pro:  n7.length ? avg(n7, 'Protein')  : null,
      carb: n7.length ? avg(n7, 'Carbs')    : null,
      fat:  n7.length ? avg(n7, 'Fats')     : null,
      days: n7.length,
      hasData: n7.length > 0,
    };

    // ── Sessions: this week only ──
    const s7 = a.sessions.filter(s => new Date(s._d) >= c7);
    const runS = s7.filter(s => ['Running','Run'].includes(s['Session Category']));
    const strS = s7.filter(s => s['Session Category'] === 'Strength');

    const strHighlights = [];
    strS.forEach(s => {
      const notes = s.Notes || s['Session Notes'] || s.Details || '';
      const lifts = ['squat','bench','deadlift','press','rdl','row','pull','lunge','hip thrust'];
      lifts.forEach(lift => {
        const m = notes.toLowerCase().match(new RegExp(`(\\d+(?:\\.\\d)?\\s*(?:kg|lb|x)\\s*)?(?:[x×]\\s*\\d+\\s*)?${lift}\\w*[^.]*`, 'i'));
        if (m && m[0].length > 4) {
          const kg = notes.match(/(\d+(?:\\.\\d)?)\s*kg/i);
          if (kg) strHighlights.push({ lift: lift.charAt(0).toUpperCase()+lift.slice(1), val: kg[1]+'kg', isPB: notes.toLowerCase().includes('pb') || notes.toLowerCase().includes('personal best') });
        }
      });
    });

    // Trends only valid when this week's check-in exists
    const pw = a.weeklyPrev;
    const trends = {};
    if (pw && weeklyThisWeek) {
      ['Energy /10','Sleep hrs','Soreness /10','Stress','Motivation'].forEach(k => {
        const cur = parseFloat(weeklyThisWeek[k]), prev = parseFloat(pw[k]);
        if (!isNaN(cur) && !isNaN(prev)) trends[k] = cur > prev ? 'up' : cur < prev ? 'dn' : '';
      });
    }

    // ── Flags: only from this week's data ──
    const flags = [];
    if (!hasRecent) {
      // Missing check-in is itself a flag
      flags.push({ t: 'yellow', l: 'No check-in yet' });
    }
    const w = weeklyThisWeek;
    if (w) {
      const nig = ((w['Run Niggles'] || '') + ' ' + (w['Lifts Niggles'] || '')).toLowerCase();
      if (['lingering','niggle','pain','tight','strain','physio','injury'].some(k => nig.includes(k)))
        flags.push({ t: 'red', l: 'Niggle', detail: nig.slice(0, 60) });
      const st = parseInt(w.Stress);
      if (st >= 8) flags.push({ t: 'red', l: 'High Stress ' + st });
      else if (st >= 6) flags.push({ t: 'yellow', l: 'Stress ' + st });
      const mo = parseInt(w.Motivation);
      if (mo && mo <= 5) flags.push({ t: 'yellow', l: 'Low Motivation ' + mo });
      const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
      if (rp > 0 && rc < rp) flags.push({ t: 'yellow', l: `Run ${rc}/${rp} sessions` });
      const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
      if (lp > 0 && lc < lp) flags.push({ t: 'yellow', l: `Lift ${lc}/${lp} sessions` });
      const rf = parseInt(w['Run Feel /10']);
      if (rf >= 8) flags.push({ t: 'green', l: 'Run Feel ' + rf + '/10' });
      if (nAvg.pro && parseFloat(nAvg.pro) < 100) flags.push({ t: 'yellow', l: 'Low Protein' });
      if (bAvg.sleep && parseFloat(bAvg.sleep) >= 8) flags.push({ t: 'green', l: 'Great Sleep ' + bAvg.sleep });
      if (strHighlights.some(h => h.isPB)) flags.push({ t: 'blue', l: 'New PB 🏆' });
      if (rp > 0 && rc >= rp) flags.push({ t: 'green', l: 'All runs hit ✓' });
      if (lp > 0 && lc >= lp) flags.push({ t: 'green', l: 'All lifts hit ✓' });
    }
    // Body notes this week only
    const recentBn = b7sorted.slice(0, 3).map(b => (b.Notes || '').toLowerCase()).join(' ');
    if (!flags.find(f => f.l.startsWith('Niggle')) &&
        ['physio','niggle','pain','injury'].some(k => recentBn.includes(k)))
      flags.push({ t: 'yellow', l: 'Body Note' });

    const alertScore =
      flags.filter(f => f.t === 'red').length * 10 +
      flags.filter(f => f.t === 'yellow').length;

    // ── Wins: only from this week's check-in ──
    const wins = [];
    if (w) {
      if (w['Runs Wins'] && !['n/a',''].includes((w['Runs Wins']||'').toLowerCase().trim()))
        wins.push({ type: 'run', text: w['Runs Wins'] });
      if (w['Lift Wins'] && !['n/a',''].includes((w['Lift Wins']||'').toLowerCase().trim()))
        wins.push({ type: 'str', text: w['Lift Wins'] });
      const rf = parseInt(w['Run Feel /10']);
      if (rf >= 9) wins.push({ type: 'run', text: `Run feel ${rf}/10` });
      const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
      if (rp > 0 && rc >= rp) wins.push({ type: 'run', text: `All ${rc}/${rp} run sessions hit` });
      const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
      if (lp > 0 && lc >= lp) wins.push({ type: 'str', text: `All ${lc}/${lp} strength sessions hit` });
    }

    return { ...a, weekly: weeklyThisWeek, bAvg, nAvg, runS, strS, strHighlights, flags, alertScore, hasRecent, weekNum: calcWeekNum(a.id), trends, wins };
  }).sort((a, b) => b.alertScore - a.alertScore);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(ath) {
  const alertN   = ath.filter(a => a.flags.some(f => f.t === 'red')).length;
  const watchN   = ath.filter(a => !a.flags.some(f => f.t === 'red') && a.flags.some(f => f.t === 'yellow')).length;
  const winN     = ath.filter(a => a.wins?.length > 0).length;
  const totalKm  = ath.reduce((s, a) => { const k = parseFloat(a.weekly?.['Weekly Run KM'] || 0); return s + (isNaN(k) ? 0 : k); }, 0);
  const checkedIn = ath.filter(a => a.hasRecent).length;
  const totalStr = ath.reduce((s, a) => s + (a.strS?.length || 0), 0);

  // Summary bar
  document.getElementById('sum-bar').innerHTML = `
    <div class="sum-card"><div class="sum-num default">${ath.length}</div><div class="sum-lbl">Athletes</div></div>
    <div class="sum-card"><div class="sum-num grn">${checkedIn}</div><div class="sum-lbl">Checked In</div></div>
    <div class="sum-card"><div class="sum-num ${alertN ? 'red' : 'grn'}">${alertN}</div><div class="sum-lbl">Need Attention</div></div>
    <div class="sum-card"><div class="sum-num warn-c">${watchN}</div><div class="sum-lbl">Watch</div></div>
    <div class="sum-card"><div class="sum-num run-c">${totalKm.toFixed(0)}</div><div class="sum-lbl">Squad KM</div></div>
    <div class="sum-card"><div class="sum-num str-c">${totalStr}</div><div class="sum-lbl">Str Sessions</div></div>
    <div class="sum-card"><div class="sum-num grn">${winN}</div><div class="sum-lbl">Had Wins</div></div>
  `;

  // Check-in strip
  if (ath.length > 0) {
    document.getElementById('checkin-grid').innerHTML = ath.map(a =>
      `<span class="cs-ath ${a.hasRecent ? 'in' : 'out'}">${esc(a.id)}</span>`
    ).join('');
    document.getElementById('checkin-strip').classList.add('visible');
  }

  // Wins ticker
  const allWins = [];
  ath.forEach(a => (a.wins || []).forEach(w => allWins.push({ athlete: a.id, ...w })));
  if (allWins.length > 0) {
    document.getElementById('wins-grid').innerHTML = allWins.slice(0,10).map(w =>
      `<div class="wt-item"><span class="wt-ath">${esc(w.athlete)}</span>${esc(w.text)}</div>`
    ).join('');
    document.getElementById('wins-ticker').classList.add('visible');
  }

  // Attention row
  const redFlags = [];
  ath.forEach(a => a.flags.filter(f => f.t === 'red').forEach(f =>
    redFlags.push({ athlete: a.id, flag: f.l })));
  const yellowFlags = [];
  ath.forEach(a => a.flags.filter(f => f.t === 'yellow').forEach(f =>
    yellowFlags.push({ athlete: a.id, flag: f.l })));
  if (redFlags.length > 0) {
    document.getElementById('attn-grid').innerHTML = redFlags.map(f =>
      `<div class="attn-item"><span class="attn-ath">${esc(f.athlete)}</span>${esc(f.flag)}</div>`
    ).join('');
    document.getElementById('attn-row').classList.add('visible');
  }

  // Week summary panel (detailed)
  const allFlagsForPanel = [...redFlags, ...yellowFlags];
  const winsHtml = allWins.slice(0, 6).map(w =>
    `<div class="ws-win"><strong>${esc(w.athlete)}</strong> — ${esc(w.text)}</div>`
  ).join('') || '<div class="ws-win" style="opacity:.4">No wins logged yet this week</div>';
  const flagsHtml = allFlagsForPanel.slice(0, 6).map(f =>
    `<div class="ws-flag ${f.soft ? 'soft' : ''}"><strong>${esc(f.athlete)}</strong> — ${esc(f.flag)}</div>`
  ).join('') || '<div style="font-size:12px;color:var(--ok);padding:6px 0">Squad looking solid — no major flags 🟢</div>';
  document.getElementById('ws-wins').innerHTML = winsHtml;
  document.getElementById('ws-flags').innerHTML = flagsHtml;
  const latestWeek = ath.find(a => a.weekly?.['Week Ending'])?.weekly?.['Week Ending'];
  document.getElementById('ws-week-label').textContent =
    latestWeek ? `Week ending ${fmtDate(latestWeek)}` : 'This Week';
  document.getElementById('week-summary').classList.add('visible');

  document.getElementById('grid').innerHTML = ath.map(buildCard).join('');
  document.getElementById('gen-btn').style.display = 'block';
  document.getElementById('squad-brief').classList.remove('visible');
}

// ── Card Builder ──────────────────────────────────────────────────────────────
function buildCard(a) {
  const w = a.weekly;
  const hW = !!w?.Name;
  const hR = a.flags.some(f => f.t === 'red');
  const hY = !hR && a.flags.some(f => f.t === 'yellow');
  const bcls = hR ? 'red' : hY ? 'yellow' : '';
  const fps = a.flags.map(f => `<span class="fp ${f.t}">${esc(f.l)}</span>`).join('');

  // Scores
  let scores = '';
  if (hW) {
    const sx = [
      { l: 'Energy',  v: w['Energy /10'],             inv: false, tk: 'Energy /10' },
      { l: 'Sleep',   v: w['Sleep hrs'],               inv: false, tk: 'Sleep hrs' },
      { l: 'Sore',    v: w['Soreness /10'],            inv: true,  tk: 'Soreness /10' },
      { l: 'Stress',  v: w['Stress'],                  inv: true,  tk: 'Stress' },
      { l: 'Motiv',   v: w['Motivation'],              inv: false, tk: 'Motivation' },
      { l: 'Nutr',    v: w['Nutrition Adherence /10'], inv: false, tk: null },
    ];
    scores = `<div class="scores">${sx.map(x => {
      const tr = x.tk && a.trends?.[x.tk];
      const trHtml = tr ? `<span class="sc-trend ${tr}">${tr === 'up' ? '▲' : '▼'}</span>` : '';
      return `<div class="sc">${trHtml}<div class="sc-lbl">${esc(x.l)}</div><div class="sc-val ${scoreClass(x.v, x.inv)}">${esc(x.v) || '—'}</div></div>`;
    }).join('')}</div>`;
  }

  // Training
  let training = '';
  if (hW) {
    const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
    const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
    const rPct = rp > 0 ? Math.min(100, Math.round(rc / rp * 100)) : 0;
    const lPct = lp > 0 ? Math.min(100, Math.round(lc / lp * 100)) : 0;
    const bad = v => v && !['n/a','','none','nope','nothing','no'].includes((v||'').toLowerCase().trim());
    const shHtml = a.strHighlights?.length ? `
      <div class="str-prs">
        ${a.strHighlights.slice(0,3).map(h => `
          <div class="pr-row">
            <span class="pr-move">${esc(h.lift)}</span>
            <span class="pr-val">${esc(h.val)}</span>
            ${h.isPB ? '<span class="pr-badge pb">PB</span>' : '<span class="pr-badge strong">↑</span>'}
          </div>`).join('')}
      </div>` : '';
    training = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot run"></div>${a.weekNum !== null ? (a.weekNum === 0 ? 'Discovery Week Training' : `Week ${a.weekNum} Training`) : 'Training'} — ${fmtDate(w['Week Ending']) || '?'}</div>
      <div class="tpair">
        <div class="tb">
          <div class="tt run"><span class="tt-icon">🏃</span>Run</div>
          <div class="ts"><strong class="hi">${rc}/${rp}</strong> sessions · <strong class="hi">${esc(w['Weekly Run KM'] || '—')} km</strong></div>
          <div class="pbar"><div class="pfill ${rPct >= 100 ? 'full' : 'run'}" style="width:${rPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Run Feel /10'] || '—')}/10</strong> · Pace: <strong>${esc(w['Average Pace'] || w['Run Pace'] || '—')}</strong></div>
          ${bad(w['Run Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Run Niggles'])}</div>` : ''}
          ${w['Runs Wins'] && w['Runs Wins'] !== 'n/a' ? `<div class="nl green"><span class="nl-lbl">✦ Win</span>${esc(w['Runs Wins'])}</div>` : ''}
        </div>
        <div class="tb">
          <div class="tt str"><span class="tt-icon">🏋️</span>Strength</div>
          <div class="ts"><strong class="his">${lc}/${lp}</strong> sessions</div>
          <div class="pbar"><div class="pfill ${lPct >= 100 ? 'full' : 'str'}" style="width:${lPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Lift Feel /10'] || '—')}/10</strong></div>
          ${bad(w['Lifts Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Lifts Niggles'])}</div>` : ''}
          ${w['Lift Wins'] && w['Lift Wins'] !== 'n/a' ? `<div class="nl green"><span class="nl-lbl">✦ Win</span>${esc(w['Lift Wins'])}</div>` : ''}
          ${shHtml}
        </div>
      </div>
      ${w['Testimonial'] ? `<div class="testim">"${esc(w['Testimonial'])}"</div>` : ''}
      ${w['Upcoming Impact'] && w['Upcoming Impact'] !== 'n/a' ? `<div class="impact">⚡ ${esc(w['Upcoming Impact'])}</div>` : ''}
    </div>`;
  }

  // Body metrics — this week only
  let bodyHtml = '';
  if (a.bAvg.hasData) {
    const bn = a.bAvg.wt !== undefined
      ? null  // weight entries often don't have notes
      : null;
    // Pull note from most recent b7 entry
    const bNote = a.body
      .filter(r => new Date(r['date:Date:start'] || r.Date) >= dago(7))
      .sort((x, y) => (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1)[0]?.Notes;
    bodyHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot body"></div>Body — this week avg</div>
      <div class="body-grid">
        ${a.bAvg.wt !== undefined ? `<div><div class="wnum">${esc(a.bAvg.wt)}<span class="wunit">kg</span></div><div class="wdate">${fmtDate(a.bAvg.wtd)}</div></div>` : ''}
        <div class="bmet">
          <div class="bm"><div class="bm-lbl">Sleep</div><div class="bm-val ${bmClass('sleep', a.bAvg.sleep)}">${a.bAvg.sleep ?? '—'}</div></div>
          <div class="bm"><div class="bm-lbl">Energy</div><div class="bm-val ${bmClass('energy', a.bAvg.energy)}">${a.bAvg.energy ?? '—'}</div></div>
          <div class="bm"><div class="bm-lbl">Stress</div><div class="bm-val ${bmClass('stress', a.bAvg.stress)}">${a.bAvg.stress ?? '—'}</div></div>
          <div class="bm"><div class="bm-lbl">Sore</div><div class="bm-val ${bmClass('sore', a.bAvg.soreness)}">${a.bAvg.soreness ?? '—'}</div></div>
        </div>
      </div>
      ${bNote ? `<div class="bnote">${esc(bNote)}</div>` : ''}
    </div>`;
  } else {
    bodyHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot body"></div>Body</div>
      <div class="no-data-msg">No daily tracking logged this week</div>
    </div>`;
  }

  // Nutrition — this week only
  let nutrHtml = '';
  if (a.nAvg.hasData) {
    const t = MACRO_TARGETS[a.id] || DEFAULT_TARGETS;
    const calS  = macroStatus(a.nAvg.cal,  t.cal);
    const proS  = macroStatus(a.nAvg.pro,  t.pro);
    const carbS = macroStatus(a.nAvg.carb, t.carb);
    const fatS  = macroStatus(a.nAvg.fat,  t.fat);
    nutrHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot nutr"></div>Nutrition — ${a.nAvg.days}d avg <span style="margin-left:auto;font-size:7px;opacity:.5">vs target</span></div>
      <div class="nutr-grid">
        <div class="mc ${calS === 'good' ? 'highlight' : calS === 'over' ? 'flag-over' : calS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Calories</div>
          <div class="mc-val">${a.nAvg.cal || '—'}</div>
          <div class="mc-status ${calS}">${macroStatusLabel(a.nAvg.cal, t.cal)}</div>
        </div>
        <div class="mc ${proS === 'good' ? 'highlight' : proS === 'over' ? 'flag-over' : proS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Protein</div>
          <div class="mc-val">${a.nAvg.pro || '—'}<span class="mc-unit">g</span></div>
          <div class="mc-status ${proS}">${macroStatusLabel(a.nAvg.pro, t.pro)}</div>
        </div>
        <div class="mc ${carbS === 'good' ? 'highlight' : carbS === 'over' ? 'flag-over' : carbS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Carbs</div>
          <div class="mc-val">${a.nAvg.carb || '—'}<span class="mc-unit">g</span></div>
          <div class="mc-status ${carbS}">${macroStatusLabel(a.nAvg.carb, t.carb)}</div>
        </div>
        <div class="mc ${fatS === 'good' ? 'highlight' : fatS === 'over' ? 'flag-over' : fatS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Fats</div>
          <div class="mc-val">${a.nAvg.fat || '—'}<span class="mc-unit">g</span></div>
          <div class="mc-status ${fatS}">${macroStatusLabel(a.nAvg.fat, t.fat)}</div>
        </div>
      </div>
      <div class="macro-compare">
        <div class="mcomp-row">
          <span class="mcomp-lbl">Protein</span>
          <div class="mcomp-track"><div class="mcomp-fill ${proS}" style="width:${Math.min(100,pct(a.nAvg.pro,t.pro))}%"></div></div>
          <span class="mcomp-val">${a.nAvg.pro || '—'}g / ${t.pro}g</span>
        </div>
        <div class="mcomp-row">
          <span class="mcomp-lbl">Cals</span>
          <div class="mcomp-track"><div class="mcomp-fill ${calS}" style="width:${Math.min(100,pct(a.nAvg.cal,t.cal))}%"></div></div>
          <span class="mcomp-val">${a.nAvg.cal || '—'} / ${t.cal}</span>
        </div>
        <div class="mcomp-row">
          <span class="mcomp-lbl">Carbs</span>
          <div class="mcomp-track"><div class="mcomp-fill ${carbS}" style="width:${Math.min(100,pct(a.nAvg.carb,t.carb))}%"></div></div>
          <span class="mcomp-val">${a.nAvg.carb || '—'}g / ${t.carb}g</span>
        </div>
      </div>
    </div>`;
  } else {
    nutrHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot nutr"></div>Nutrition</div>
      <div class="no-data-msg">No nutrition logged this week</div>
    </div>`;
  }

  // No weekly check-in placeholder (replaces training block when missing)
  let noCheckinHtml = '';
  if (!hW) {
    noCheckinHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot run"></div>Weekly Check-in</div>
      <div class="no-checkin-msg">
        <span class="nc-icon">📋</span>
        <span>No check-in submitted this week</span>
      </div>
    </div>`;
  }

  // Session fallback — only show if no weekly check-in but sessions exist
  let sessHtml = '';
  if (!hW && (a.runS.length || a.strS.length)) {
    sessHtml = `<div class="sec">
      <div class="sec-ttl">Sessions logged this week</div>
      <div class="sess-row">
        <div class="scard"><div class="snum run-c">${a.runS.length}</div><div class="slbl">Run</div></div>
        <div class="scard"><div class="snum str-c">${a.strS.length}</div><div class="slbl">Strength</div></div>
      </div>
    </div>`;
  }

  const metaText = a.hasRecent
    ? `Week ending ${fmtDate(w?.['Week Ending'])}`
    : 'No check-in this week';

  return `<div class="card ${bcls}" data-card="${esc(a.id)}">
    <div class="card-head">
      <div class="card-head-top">
        <div>
          <div class="aname">${esc(a.id)}</div>
          <div class="ameta ${!a.hasRecent ? 'nocheckin' : ''}">${metaText}</div>
        </div>
        ${a.weekNum !== null ? `<div class="week-badge"><div class="wk-num">${a.weekNum}</div><div class="wk-lbl">${a.weekNum === 0 ? 'Discovery' : 'Week'}</div></div>` : ''}
      </div>
      ${a.flags.length ? `<div class="flags">${fps}</div>` : ''}
    </div>
    ${scores}${hW ? training : noCheckinHtml}${sessHtml}${bodyHtml}${nutrHtml}
    <div class="ai-sec"></div>
  </div>`;
}

// ── AI Analysis ───────────────────────────────────────────────────────────────
let _lastAthletes = [];
async function generateAI() {
  if (!_lastAthletes.length) return;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '✦ Analysing…';
  document.querySelectorAll('.ai-sec').forEach(sec => {
    sec.innerHTML = `<div class="ai-loading">
      <div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div>
      <span>Generating coaching analysis…</span>
    </div>`;
  });
  try {
    const payload = _lastAthletes
      .filter(a => a.weekly || a.bAvg?.wt != null)
      .map(a => ({
        id: a.id, weekNum: a.weekNum, weekly: a.weekly, weeklyPrev: a.weeklyPrev,
        bAvg: a.bAvg, nAvg: a.nAvg, strHighlights: a.strHighlights, wins: a.wins,
        runSessions: a.runS.length, strSessions: a.strS.length, flags: a.flags,
      }));
    const res = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        athletes: payload,
        prompt: `You are an expert hybrid coach. For each athlete provide:
1. status: GREEN (on track), AMBER (needs watch), or RED (needs immediate attention)
2. wins: array of 1-3 specific wins (be specific about numbers, PRs, consistency)
3. concerns: array of 1-3 things to flag (low protein, missed sessions, niggles — be specific)
4. flags: array of coaching notes (max 3)
5. recommendation: 2-3 sentence personalised coaching note with specific next steps
Focus on: strength wins/PRs, macro targets vs actuals (especially protein), training completion, recovery trends, injury flags. Be specific and data-driven.
Also provide a squadBrief: 2-3 sentence overall squad summary highlighting key themes.
Return JSON: { analyses: [{id, status, wins, concerns, flags, recommendation}], squadBrief }`
      }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
    const { analyses, squadBrief } = await res.json();
    analyses.forEach(analysis => {
      const sec = document.querySelector(`[data-card="${analysis.id}"] .ai-sec`);
      if (!sec) return;
      const winsHtml    = (analysis.wins    || []).map(w => `<div class="ai-win-item">${esc(w)}</div>`).join('');
      const concernsHtml= (analysis.concerns|| []).map(c => `<div class="ai-concern-item">${esc(c)}</div>`).join('');
      sec.innerHTML = `
        <div class="ai-header">
          <div class="ai-status-badge ${analysis.status}">${analysis.status}</div>
        </div>
        ${winsHtml     ? `<div class="ai-wins">${winsHtml}</div>` : ''}
        ${concernsHtml ? `<div class="ai-concerns">${concernsHtml}</div>` : ''}
        ${(analysis.flags||[]).length ? `<div class="ai-flags">${analysis.flags.map(f=>`<div class="ai-flag">${esc(f)}</div>`).join('')}</div>` : ''}
        <div class="ai-rec">${esc(analysis.recommendation)}</div>`;
    });
    if (squadBrief) {
      document.getElementById('squad-brief-text').textContent = squadBrief;
      document.getElementById('squad-brief').classList.add('visible');
      document.getElementById('ws-ai-text').textContent = squadBrief;
      document.getElementById('ws-ai-text').style.display = 'block';
    }
    btn.textContent = '✦ Regenerate';
  } catch (e) {
    document.querySelectorAll('.ai-sec').forEach(sec => {
      sec.innerHTML = `<div class="ai-loading" style="color:var(--alert)">${esc(e.message)}</div>`;
    });
    btn.textContent = '✦ Retry';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', load);
document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('gen-btn').addEventListener('click', generateAI);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaches Dashboard — Dual Performance</title>
<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f0ede8;
  --border:rgba(0,0,0,.08);--border-mid:rgba(0,0,0,.14);
  --text:#0a0a0a;--muted:#5a5a5a;--dim:#999;
  --run:#b45309;--str:#1e3a8a;
  --ok:#15803d;--warn:#d97706;--alert:#dc2626;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
  --sans:system-ui,-apple-system,sans-serif;
  --green-bg:#f0fdf4;--green-border:#86efac;--green-text:#15803d;
  --amber-bg:#fffbeb;--amber-border:#fcd34d;--amber-text:#92400e;
  --red-bg:#fef2f2;--red-border:#fca5a5;--red-text:#991b1b;
  --coach-bg:#f0f4ff;--coach-border:#a5b4fc;--coach-text:#3730a3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}

/* ── Header ── */
header{background:#0a0a0a;padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.logo{font-size:16px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.logo .d{color:#fff}.logo .p{color:rgba(255,255,255,.28)}
.h-mid{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;white-space:nowrap}
.h-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.updated{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.28);white-space:nowrap}
.refresh-btn{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.refresh-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Tab Bar ── */
.tab-bar{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08);padding:0 18px;display:flex;align-items:flex-end;gap:2px;position:sticky;top:50px;z-index:99}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.35);font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:10px 16px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:rgba(255,255,255,.65)}
.tab.active{color:#fff;border-bottom-color:#fff}
.tab-badge{background:rgba(255,255,255,.12);border-radius:20px;padding:1px 7px;font-size:9px;min-width:20px;text-align:center}
.tab.active .tab-badge{background:rgba(255,255,255,.22)}
.tab-badge.red{background:rgba(220,38,38,.5);color:#fca5a5}

/* ── Filter Bar ── */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:82px;z-index:98}
.search-input{border:1px solid var(--border-mid);border-radius:7px;padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--text);background:var(--surface);outline:none;min-width:180px;transition:border .15s}
.search-input:focus{border-color:rgba(0,0,0,.3)}
.search-input::placeholder{color:var(--dim)}
.sf-group{display:flex;gap:4px;align-items:center}
.sf{background:transparent;border:1px solid var(--border-mid);border-radius:20px;padding:4px 12px;font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;color:var(--muted);transition:all .15s}
.sf:hover{border-color:rgba(0,0,0,.25);color:var(--text)}
.sf.active{background:#0a0a0a;border-color:#0a0a0a;color:#fff}
.sf.sf-red.active{background:var(--alert);border-color:var(--alert);color:#fff}
.sf.sf-amber.active{background:var(--warn);border-color:var(--warn);color:#fff}
.sf.sf-green.active{background:var(--ok);border-color:var(--ok);color:#fff}
.sort-select{border:1px solid var(--border-mid);border-radius:7px;padding:5px 10px;font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface);cursor:pointer;outline:none}
.filter-divider{width:1px;height:22px;background:var(--border-mid)}
.filter-label{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}

/* ── Layout ── */
.main{padding:14px 14px 40px;max-width:1400px;margin:0 auto}

/* ── Summary bar ── */
.summary-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:100px}
.sum-num{font-size:24px;font-weight:800;letter-spacing:-.01em;line-height:1;margin-bottom:1px}
.sum-num.red{color:var(--alert)}.sum-num.grn{color:var(--ok)}.sum-num.run-c{color:var(--run)}.sum-num.str-c{color:var(--str)}
.sum-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

/* ── States ── */
.state-box{text-align:center;padding:60px 20px}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.state-txt{font-family:var(--mono);font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px}

/* ── Card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.card.red{border-color:rgba(220,38,38,.35)}.card.yellow{border-color:rgba(217,119,6,.3)}
.card.hidden{display:none}
.card-head{background:#0a0a0a;padding:11px 14px 10px}
.aname{font-size:22px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;color:#fff;line-height:1}
.ameta{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.ameta.nocheckin{color:rgba(248,113,113,.6)}
.flags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.fp{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.fp.red{background:rgba(248,113,113,.18);color:#fca5a5;border:1px solid rgba(248,113,113,.3)}
.fp.yellow{background:rgba(251,191,36,.15);color:#f59e0b;border:1px solid rgba(251,191,36,.28)}
.fp.green{background:rgba(74,222,128,.12);color:#059669;border:1px solid rgba(74,222,128,.22)}

/* ── Scores row ── */
.scores{display:flex;border-bottom:1px solid var(--border)}
.sc{flex:1;padding:8px 3px;text-align:center;border-right:1px solid var(--border)}.sc:last-child{border-right:none}
.sc-lbl{font-family:var(--mono);font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.sc-val{font-size:17px;font-weight:800;line-height:1}
.sc-val.good{color:var(--ok)}.sc-val.mid{color:var(--warn)}.sc-val.bad{color:var(--alert)}.sc-val.n{color:var(--text)}

/* ── Compliance bar ── */
.compliance-row{display:flex;align-items:center;gap:8px;padding:8px 13px 4px;border-bottom:1px solid var(--border)}
.comp-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.comp-track{flex:1;height:5px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden}
.comp-fill{height:100%;border-radius:3px;transition:width .3s}
.comp-fill.good{background:var(--ok)}.comp-fill.mid{background:var(--warn)}.comp-fill.bad{background:var(--alert)}
.comp-pct{font-family:var(--mono);font-size:10px;font-weight:700;min-width:28px;text-align:right}
.comp-pct.good{color:var(--ok)}.comp-pct.mid{color:var(--warn)}.comp-pct.bad{color:var(--alert)}

/* ── Sections ── */
.sec{padding:10px 13px;border-bottom:1px solid var(--border)}.sec:last-child{border-bottom:none}
.sec-ttl{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}

/* ── Training ── */
.tpair{display:flex;gap:7px}
.tb{flex:1;background:var(--surface2);border-radius:8px;padding:8px 9px}
.tt{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.tt.run{color:var(--run)}.tt.str{color:var(--str)}
.ts{font-family:var(--mono);font-size:9px;color:var(--muted);line-height:1.6}
.ts strong{color:var(--text)}
.pbar{height:3px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden;margin:4px 0}
.pfill{height:100%;border-radius:2px}.pfill.run{background:var(--run)}.pfill.str{background:var(--str)}
.nl{font-size:11px;color:var(--muted);line-height:1.4;margin-top:3px}
.nl-lbl{font-family:var(--mono);font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:1px}
.nl.red{color:var(--alert)}
.testim{font-size:11px;color:var(--muted);font-style:italic;line-height:1.4;padding:6px 9px;background:var(--surface2);border-radius:6px;border-left:2px solid rgba(0,0,0,.1);margin-top:6px}
.impact{font-size:11px;color:#92400e;margin-top:5px;padding:4px 8px;background:#fffbeb;border-radius:5px;border-left:2px solid var(--warn)}

/* ── Body ── */
.body-grid{display:flex;align-items:flex-start;gap:14px}
.wnum{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.01em}
.wunit{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:2px}
.wdate{font-family:var(--mono);font-size:8px;color:var(--dim);margin-top:2px}
.bmet{flex:1;display:flex;gap:8px}
.bm{flex:1;text-align:center}
.bm-lbl{font-family:var(--mono);font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.bm-val{font-size:15px;font-weight:700}
.bnote{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:6px;border-left:2px solid var(--alert);padding-left:6px;line-height:1.4}

/* ── Nutrition ── */
.mrow{display:flex;gap:6px}
.mc{flex:1;background:var(--surface2);border-radius:6px;padding:6px 8px;text-align:center}
.mc-lbl{font-family:var(--mono);font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.mc-val{font-size:15px;font-weight:700;line-height:1}
.mc-unit{font-family:var(--mono);font-size:8px;color:var(--dim)}

/* ── Week badge ── */
.card-head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.week-badge{text-align:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:8px;padding:5px 12px;flex-shrink:0}
.wk-num{font-size:24px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.01em}
.wk-lbl{font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

/* ── Session count (no weekly) ── */
.sess-row{display:flex;gap:8px;margin-bottom:4px}
.scard{background:var(--surface2);border-radius:7px;padding:7px 11px;text-align:center}
.snum{font-size:20px;font-weight:800;line-height:1}.snum.run-c{color:var(--run)}.snum.str-c{color:var(--str)}
.slbl{font-family:var(--mono);font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* ── Call Prep ── */
.call-prep{border-top:2px solid #0a0a0a}
.cp-header{background:#0a0a0a;padding:8px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cp-title{font-family:var(--mono);font-size:9px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:7px}
.cp-icon{font-size:11px}
.cp-toggle{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);transition:transform .2s}
.cp-toggle.open{transform:rotate(180deg)}
.cp-body{padding:11px 13px;display:flex;flex-direction:column;gap:9px}
.cp-block{}
.cp-block-lbl{font-family:var(--mono);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.cp-block-lbl.win{color:var(--ok)}
.cp-block-lbl.issue{color:var(--alert)}
.cp-block-lbl.ask{color:var(--str)}
.cp-block-lbl.note-lbl{color:var(--dim)}
.cp-items{display:flex;flex-direction:column;gap:3px}
.cp-item{font-size:11px;color:var(--muted);line-height:1.5;padding-left:14px;position:relative}
.cp-item::before{position:absolute;left:0;font-size:10px}
.cp-item.win::before{content:'✓';color:var(--ok)}
.cp-item.issue::before{content:'⚠';color:var(--alert)}
.cp-item.ask::before{content:'→';color:var(--str)}
.cp-item em{font-style:italic;color:var(--dim)}
.cp-none{font-family:var(--mono);font-size:9px;color:var(--dim);font-style:italic}
.cp-note{width:100%;border:1px solid var(--border-mid);border-radius:6px;padding:7px 10px;font-family:var(--sans);font-size:11px;color:var(--text);background:var(--surface2);resize:vertical;min-height:52px;outline:none;transition:border .15s;line-height:1.45}
.cp-note:focus{border-color:rgba(0,0,0,.3);background:var(--surface)}
.cp-note::placeholder{color:var(--dim)}

/* ── AI analysis ── */
.gen-btn{background:#0a0a0a;border:1px solid rgba(255,255,255,.25);color:#fff;font-family:var(--mono);font-size:10px;padding:5px 14px;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.gen-btn:hover{background:#222;border-color:rgba(255,255,255,.5)}
.gen-btn:disabled{opacity:.4;cursor:not-allowed}
.gen-btn.loading{background:#1a327a;border-color:#3b5bdb;color:#bfdbfe}

.squad-brief{background:#0a0a0a;color:#fff;border-radius:12px;padding:16px 18px;margin-bottom:14px;display:none}
.squad-brief.visible{display:block}
.sb-title{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.sb-text{font-size:13px;color:rgba(255,255,255,.82);line-height:1.6}

.ai-sec{padding:11px 13px;border-top:1px solid var(--border)}
.ai-status-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.ai-status-badge.GREEN{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
.ai-status-badge.AMBER{background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber-border)}
.ai-status-badge.RED{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red-border)}
.ai-status-badge::before{content:'●';font-size:8px}

.ai-flags{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.ai-flag{font-family:var(--mono);font-size:9px;color:var(--muted);padding-left:10px;position:relative;line-height:1.5}
.ai-flag::before{content:'—';position:absolute;left:0;color:var(--dim)}

.ai-rec{font-size:12px;color:var(--text);line-height:1.55;padding:9px 11px;background:var(--surface2);border-radius:7px;border-left:3px solid #0a0a0a}

.ai-loading{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;padding:8px 0;display:flex;align-items:center;gap:6px}
.ai-loading-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);animation:blink 1.2s infinite}
.ai-loading-dot:nth-child(2){animation-delay:.2s}.ai-loading-dot:nth-child(3){animation-delay:.4s}

/* ── Coaches Tab ── */
.coaches-section{max-width:1400px;margin:0 auto;padding:14px 14px 40px}
.coaches-intro{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
.coaches-intro-icon{font-size:22px}
.coaches-intro-text{font-size:13px;color:var(--muted)}
.coaches-intro-text strong{color:var(--text)}
.coaches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}

.coach-card{background:var(--surface);border:1px solid var(--coach-border);border-radius:14px;overflow:hidden}
.coach-card-head{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 100%);padding:14px 16px 12px}
.coach-card-head-top{display:flex;justify-content:space-between;align-items:flex-start}
.coach-name-row{display:flex;align-items:center;gap:10px}
.coach-name{font-size:26px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff;line-height:1}
.coach-badge{font-family:var(--mono);font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.3);align-self:center}
.coach-meta{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.coach-wk-badge{text-align:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:5px 14px}
.coach-wk-num{font-size:26px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.01em}
.coach-wk-lbl{font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

.coach-scores{display:flex;border-bottom:1px solid var(--border)}
.coach-scores .sc{flex:1;padding:9px 3px;text-align:center;border-right:1px solid var(--border)}
.coach-scores .sc:last-child{border-right:none}

.coach-training{padding:12px 14px;border-bottom:1px solid var(--border)}
.coach-training-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}

.coach-body-row{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.coach-body-item{flex:1;background:var(--coach-bg);border-radius:7px;padding:8px 10px;text-align:center}
.coach-body-item-val{font-size:18px;font-weight:800;color:var(--coach-text);line-height:1}
.coach-body-item-lbl{font-family:var(--mono);font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

.coach-notes{padding:12px 14px}
.coach-notes-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.coach-quote{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;padding:7px 10px;background:var(--surface2);border-radius:7px;border-left:2px solid var(--coach-border)}

.coach-no-data{padding:30px;text-align:center}
.coach-no-data-txt{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

/* ── No results ── */
.no-results{text-align:center;padding:50px 20px}
.no-results-txt{font-family:var(--mono);font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

/* ── Responsive ── */
@media(max-width:600px){
  .filter-bar{top:82px}
  .tab-bar{top:50px}
  .grid{grid-template-columns:1fr}
  .coaches-grid{grid-template-columns:1fr}
  .search-input{width:100%}
}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="d">DUAL</span> <span class="p">PERFORMANCE</span></div>
  <div class="h-mid">Coaches Dashboard</div>
  <div class="h-right">
    <span class="updated" id="updated"></span>
    <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    <button class="gen-btn" id="gen-btn" style="display:none">✦ AI Summaries</button>
  </div>
</header>

<div class="tab-bar">

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const DB = {
  weekly:    '33e5a96c-c70b-8049-b696-d22e5920e0ee',
  sessions:  '1c55a96c-c70b-825b-9bdf-819abea4ef7c',
  body:      '3405a96c-c70b-80a4-b1b9-cf5b9c236f18',
  nutrition: '3405a96c-c70b-804b-aa9c-f165f2d2e0e9',
  athletes:  '4a25a96c-c70b-82ff-a679-0139eaa8b458',
};

const ALIASES = { 'JACOB TUAZON': 'JACOB' };

// Coaches are filtered OUT of the athletes grid and shown on the Coaches tab
const COACHES = new Set(['KARL', 'ALEX']);

// Week anchors for athletes without a Notion Start Date.
// { ID: { week: N, endDate: 'YYYY-MM-DD' } }
// 'week' = the week number whose last day was 'endDate'.
// calcWeekNum() auto-advances each Monday — no manual updates needed week to week.
// Remove an entry once that athlete has a Start Date set in Notion.
const WEEK_OVERRIDES = {
  // week 7 ran Apr 27 – May 3. Now (Mon May 4) we're in week 8.
  // endDate = the Sunday that week N ended on → calcWeekNum auto-advances from here.
  'JACOB': { week: 7, endDate: '2026-05-03' },
  'KHANG': { week: 7, endDate: '2026-05-03' },
};

// In-memory call notes per athlete
const callNotes = {};

// ── Local date helper (avoids UTC-shift bug with toISOString) ─────────────────
function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const n = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${n}`;
}

// ── Current week ending (same for ALL athletes) ───────────────────────────────
// Weeks run Mon–Sun. Week resets on Monday.
// "Current week ending" = the COMING Sunday (or today if today IS Sunday).
// Examples:
//   Mon 4 May  → week ends Sun 10 May  (new week just started, reset)
//   Thu 7 May  → week ends Sun 10 May
//   Sun 10 May → week ends Sun 10 May  (last day of this week)
// Bug fixed: use localDateStr() not toISOString() — ISO converts to UTC which
// shifts the date back by 10–11 hours in AEST and gives the wrong day.
const currentWeekEnd = (() => {
  const today = new Date();
  const day = today.getDay();               // 0=Sun, 1=Mon … 6=Sat
  const daysUntilSunday = day === 0 ? 0 : 7 - day;
  const sunday = new Date(today);
  sunday.setDate(today.getDate() + daysUntilSunday);
  return localDateStr(sunday);
})();

// ── Helpers ──────────────────────────────────────────────────────────────────
function nid(s) {
  if (!s) return null;
  const u = s.toUpperCase().trim();
  return ALIASES[u] || u;
}
function sid(r) {
  const code = r['Athlete Code'];
  if (code) return nid(code);
  const name = (r.Name || '').split('—')[0].trim();
  return name ? nid(name) : null;
}
function avg(arr, k) {
  const v = arr.map(r => parseFloat(r[k])).filter(x => !isNaN(x));
  return v.length ? (v.reduce((a, b) => a + b, 0) / v.length).toFixed(1) : null;
}
function dago(n) { const d = new Date(); d.setDate(d.getDate() - n); return d; }
function dagoStr(n) { return localDateStr(dago(n)); } // timezone-safe date string
function scoreClass(v, inv) {
  const n = parseFloat(v);
  if (isNaN(n)) return 'n';
  if (inv) return n >= 8 ? 'bad' : n >= 6 ? 'mid' : 'good';
  return n >= 7.5 ? 'good' : n >= 5 ? 'mid' : 'bad';
}
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = String(s).split('T')[0].split('-');
  if (!y || !m || !d) return s;
  return `${d}-${m}-${y}`;
}
function isBad(v) {
  return v && !['n/a', '', 'none', 'nope', 'nothing', 'no', '-'].includes((v || '').toLowerCase().trim());
}
function daysAgo(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  return diff;
}

// ── Fetch ────────────────────────────────────────────────────────────────────
async function fetchDB(dbId) {
  const res = await fetch(`/api/notion?db=${dbId}`);
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.results || [];
}

// ── Build ─────────────────────────────────────────────────────────────────────
function buildAll(weekly, sessions, body, nutrition, athleteDb = []) {
  const c14 = dago(14), c7 = dago(7);
  const map = {};

  function ens(id) {
    if (!id || id.length < 2) return;
    if (!map[id]) map[id] = { id, weekly: null, body: [], nutrition: [], sessions: [] };
  }

  const startDates = {};
  athleteDb.forEach(r => {
    const code = nid(r.Code || r.Athlete);
    const sd = r['date:Start Date:start'] || r['Start Date'];
    if (code && sd) startDates[code] = sd;
  });

  function calcWeekNum(id) {
    if (COACHES.has(id)) return null;

    // Priority 1: Notion Start Date (most accurate — set this per athlete in Notion)
    const sd = startDates[id];
    if (sd) {
      // Week 1 = days 0–6 from start. Week N = floor(days/7) + 1.
      const diffDays = Math.floor((Date.now() - new Date(sd)) / 86400000);
      return Math.max(1, Math.floor(diffDays / 7) + 1);
    }

    // Priority 2: Date-anchored override — auto-advances each Monday without manual edits.
    // anchor.week = the week that ENDED on anchor.endDate.
    // currentWeekEnd is the coming Sunday. Weeks between anchor and now = full 7-day blocks.
    if (WEEK_OVERRIDES.hasOwnProperty(id)) {
      const anchor = WEEK_OVERRIDES[id];
      const weeksSinceAnchor = Math.round(
        (new Date(currentWeekEnd) - new Date(anchor.endDate)) / (7 * 86400000)
      );
      // anchor.week ended on anchor.endDate, so the week that ends on currentWeekEnd
      // is anchor.week + weeksSinceAnchor
      return anchor.week + weeksSinceAnchor;
    }

    return null;
  }

  // Weekly — keep latest per athlete
  const wl = {};
  weekly.forEach(r => {
    const id = nid(r.Name);
    if (!id || !r['Week Ending']) return;
    if (!wl[id] || r['Week Ending'] > wl[id]['Week Ending']) wl[id] = r;
  });
  Object.entries(wl).forEach(([id, r]) => { ens(id); map[id].weekly = r; });

  // Body (14d)
  body.forEach(r => {
    const id = nid(r.AthleteID);
    if (!id) return;
    ens(id);
    const d = r['date:Date:start'] || r.Date;
    if (d && new Date(d) >= c14) map[id].body.push(r);
  });

  // Nutrition (14d)
  nutrition.forEach(r => {
    const id = nid(r.AthleteID);
    if (!id) return;
    ens(id);
    const d = r['date:Date:start'] || r.Date;
    if (d && new Date(d) >= c14) map[id].nutrition.push(r);
  });

  // Sessions
  const seen = new Set();
  sessions.forEach(r => {
    const id = sid(r);
    if (!id || !map[id]) return;
    const ds = ((r.Date || r['Submitted At'] || r._createdTime || '')).split('T')[0];
    if (!ds || new Date(ds) < c14) return;
    const k = `${id}|${r.Session || ''}|${r['Session Category'] || ''}|${ds}`;
    if (!seen.has(k)) { seen.add(k); map[id].sessions.push({ ...r, _d: ds }); }
  });

  // Derive stats
  const all = Object.values(map).map(a => {
    const b7 = a.body.filter(r => new Date(r['date:Date:start'] || r.Date) >= c7);
    const n7 = a.nutrition.filter(r => new Date(r['date:Date:start'] || r.Date) >= c7);
    const bSorted = [...a.body].sort((x, y) =>
      (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1);
    const bLast = bSorted[0];

    const bAvg = {
      wt: bLast?.Weight,
      wtd: bLast?.['date:Date:start'] || bLast?.Date,
      sleep: avg(b7, 'Sleep Score'),
      energy: avg(b7, 'Energy'),
      stress: avg(b7, 'Stress'),
      soreness: avg(b7, 'Soreness'),
    };
    const nAvg = {
      cal: avg(n7, 'Calories'),
      pro: avg(n7, 'Protein'),
      carb: avg(n7, 'Carbs'),
      fat: avg(n7, 'Fats'),
      days: n7.length,
    };

    const s7 = a.sessions.filter(s => new Date(s._d) >= c7);
    const runS = s7.filter(s => s['Session Category'] === 'Running' || s['Session Category'] === 'Run');
    const strS = s7.filter(s => s['Session Category'] === 'Strength');

    // Compliance
    const w = a.weekly;
    const rp = parseInt(w?.['Run Planned']) || 0;
    const rc = parseInt(w?.['Run Completed']) || 0;
    const lp = parseInt(w?.['Lift Planned']) || 0;
    const lc = parseInt(w?.['Lift Completed']) || 0;
    const totalPlanned = rp + lp;
    const totalDone = rc + lc;
    const compliance = totalPlanned > 0 ? Math.round((totalDone / totalPlanned) * 100) : null;

    // Flags
    const flags = [];
    if (w) {
      const nig = ((w['Run Niggles'] || '') + ' ' + (w['Lifts Niggles'] || '')).toLowerCase();
      if (['lingering', 'niggle', 'pain', 'tight', 'strain', 'physio', 'injury'].some(k => nig.includes(k)))
        flags.push({ t: 'red', l: 'Niggle' });

      const st = parseInt(w.Stress);
      if (st >= 8) flags.push({ t: 'red', l: 'Stress ' + st });
      else if (st >= 6) flags.push({ t: 'yellow', l: 'Stress ' + st });

      const mo = parseInt(w.Motivation);
      if (mo && mo <= 5) flags.push({ t: 'yellow', l: 'Low Motiv ' + mo });

      if (rp > 0 && rc < rp) flags.push({ t: 'yellow', l: `Run ${rc}/${rp}` });
      if (lp > 0 && lc < lp) flags.push({ t: 'yellow', l: `Lift ${lc}/${lp}` });

      const rf = parseInt(w['Run Feel /10']);
      if (rf >= 8) flags.push({ t: 'green', l: 'Run Feel ' + rf });
    }

    const recentBn = bSorted.slice(0, 3).map(b => (b.Notes || '').toLowerCase()).join(' ');
    if (!flags.find(f => f.l === 'Niggle') &&
        ['physio', 'niggle', 'pain', 'injury'].some(k => recentBn.includes(k)))
      flags.push({ t: 'yellow', l: 'Body Note' });

    const alertScore =
      flags.filter(f => f.t === 'red').length * 10 +
      flags.filter(f => f.t === 'yellow').length;

    // Weeks reset on Monday for everyone.
    // The expected week ending is always the MOST RECENT SUNDAY (same date for all athletes).
    const wkNum = calcWeekNum(a.id);
    const expectedWeekEnd = currentWeekEnd; // global, computed once at load time

    const wkEnd = w?.['Week Ending'] || '';
    const wkEndDate = wkEnd ? new Date(wkEnd) : null;

    // Submitted for the CURRENT week (within ±3 days of coming Sunday)
    const hasCurrentCheckin = !!wkEndDate && (() => {
      const diff = Math.abs(wkEndDate - new Date(expectedWeekEnd)) / 86400000;
      return diff <= 3;
    })();

    // Submitted for LAST week — within 8 days but doesn't match current week.
    // e.g. athlete submitted Sunday May 3, today is Monday May 4 — show their data,
    // just note it's last week's. Don't alarm the coaches.
    const daysSinceSubmission = wkEndDate
      ? Math.floor((Date.now() - wkEndDate) / 86400000)
      : 999;
    const hasLastWeekCheckin = !hasCurrentCheckin && daysSinceSubmission <= 8;

    // Stale = genuinely missing — no submission for more than 8 days
    const isStale = !hasCurrentCheckin && !hasLastWeekCheckin;

    // hasRecent used for summary bar "Checked In" count
    const hasRecent = hasCurrentCheckin || hasLastWeekCheckin;

    return {
      ...a, bAvg, nAvg, runS, strS, flags, alertScore,
      hasRecent, hasCurrentCheckin, hasLastWeekCheckin, isStale,
      expectedWeekEnd, compliance,
      weekNum: wkNum,
      isCoach: COACHES.has(a.id),
    };
  });

  const coaches  = all.filter(a => a.isCoach);
  const athletes = all.filter(a => !a.isCoach).sort((a, b) => b.alertScore - a.alertScore);

  return { athletes, coaches };
}

// ── Render athletes ───────────────────────────────────────────────────────────
let _allAthletes = [];
let _coaches = [];
let _statusFilter = 'all';

function render({ athletes, coaches }) {
  _allAthletes = athletes;
  _coaches     = coaches;

  // Tab count
  const alertCount = athletes.filter(a => a.flags.some(f => f.t === 'red')).length;
  const badge = document.getElementById('tab-ath-count');
  badge.textContent = athletes.length;
  if (alertCount > 0) badge.classList.add('red'); else badge.classList.remove('red');

  renderSummary(athletes);
  renderGrid(athletes);
  renderCoaches(coaches);

  document.getElementById('gen-btn').style.display = 'block';
  document.getElementById('squad-brief').classList.remove('visible');
}

function renderSummary(ath) {
  const alertN   = ath.filter(a => a.flags.some(f => f.t === 'red')).length;
  const watchN   = ath.filter(a => !a.flags.some(f => f.t === 'red') && a.flags.some(f => f.t === 'yellow')).length;
  const checkedIn = ath.filter(a => a.hasCurrentCheckin || a.hasRecent).length;
  const totalKm  = ath.reduce((s, a) => {
    const k = parseFloat(a.weekly?.['Weekly Run KM'] || 0);
    return s + (isNaN(k) ? 0 : k);
  }, 0);
  const compList = ath.filter(a => a.compliance !== null).map(a => a.compliance);
  const avgComp  = compList.length
    ? Math.round(compList.reduce((a, b) => a + b, 0) / compList.length)
    : null;

  document.getElementById('sum-bar').innerHTML = `
    <div class="sum-card"><div class="sum-num">${ath.length}</div><div class="sum-lbl">Athletes</div></div>
    <div class="sum-card"><div class="sum-num ${alertN ? 'red' : 'grn'}">${alertN}</div><div class="sum-lbl">Need Attention</div></div>
    <div class="sum-card"><div class="sum-num">${watchN}</div><div class="sum-lbl">Watch</div></div>
    <div class="sum-card"><div class="sum-num grn">${checkedIn}</div><div class="sum-lbl">Checked In</div></div>
    <div class="sum-card"><div class="sum-num run-c">${totalKm.toFixed(0)}</div><div class="sum-lbl">Squad KM (14d)</div></div>
    ${avgComp !== null ? `<div class="sum-card"><div class="sum-num ${avgComp >= 80 ? 'grn' : avgComp >= 60 ? '' : 'red'}">${avgComp}%</div><div class="sum-lbl">Avg Compliance</div></div>` : ''}`;
}

function renderGrid(ath) {
  document.getElementById('grid').innerHTML = ath.map(buildCard).join('');
}

function renderCoaches(coaches) {
  const grid = document.getElementById('coaches-grid');
  if (!coaches.length) {
    grid.innerHTML = `<div class="coach-no-data"><div class="coach-no-data-txt">No coach data found for Karl or Alex</div></div>`;
    return;
  }
  // Always show Karl first, then Alex, then others
  const ordered = [
    ...coaches.filter(c => c.id === 'KARL'),
    ...coaches.filter(c => c.id === 'ALEX'),
    ...coaches.filter(c => c.id !== 'KARL' && c.id !== 'ALEX'),
  ];
  grid.innerHTML = ordered.map(buildCoachCard).join('');
}

// ── Athlete Card ──────────────────────────────────────────────────────────────
function buildCard(a) {
  const w = a.weekly;
  const hW = !!w?.Name;
  const hR = a.flags.some(f => f.t === 'red');
  const hY = !hR && a.flags.some(f => f.t === 'yellow');
  const bcls = hR ? 'red' : hY ? 'yellow' : '';
  const fps = a.flags.map(f => `<span class="fp ${f.t}">${esc(f.l)}</span>`).join('');

  // Scores
  let scores = '';
  if (hW) {
    const sx = [
      { l: 'Energy',  v: w['Energy /10'],             inv: false },
      { l: 'Sleep',   v: w['Sleep hrs'],               inv: false },
      { l: 'Sore',    v: w['Soreness /10'],            inv: true  },
      { l: 'Stress',  v: w['Stress'],                  inv: true  },
      { l: 'Motiv',   v: w['Motivation'],              inv: false },
      { l: 'Nutr',    v: w['Nutrition Adherence /10'], inv: false },
    ];
    scores = `<div class="scores">${sx.map(x =>
      `<div class="sc"><div class="sc-lbl">${esc(x.l)}</div><div class="sc-val ${scoreClass(x.v, x.inv)}">${esc(x.v) || '—'}</div></div>`
    ).join('')}</div>`;
  }

  // Compliance bar
  let compBar = '';
  if (a.compliance !== null) {
    const cc = a.compliance >= 90 ? 'good' : a.compliance >= 70 ? 'mid' : 'bad';
    compBar = `<div class="compliance-row">
      <span class="comp-lbl">Compliance</span>
      <div class="comp-track"><div class="comp-fill ${cc}" style="width:${a.compliance}%"></div></div>
      <span class="comp-pct ${cc}">${a.compliance}%</span>
    </div>`;
  }

  // Stale banner: BIG warning only for genuinely missing athletes (>8 days)
  // Last-week submitters get a soft note — they submitted, new week just started
  let staleBanner = '';
  if (hW && a.isStale) {
    staleBanner = `<div class="sec" style="background:#fef2f2;border-color:rgba(220,38,38,.18)">
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:13px">🚨</span>
          <div>
            <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#991b1b;text-transform:uppercase;letter-spacing:.08em">No check-in submitted this week</div>
            <div style="font-family:var(--mono);font-size:9px;color:#b91c1c;margin-top:1px">Showing last submission — week ending ${fmtDate(w['Week Ending'])}</div>
          </div>
        </div>
      </div>`;
  } else if (hW && a.hasLastWeekCheckin) {
    staleBanner = `<div class="sec" style="background:#f0f9ff;border-color:rgba(14,165,233,.15)">
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:12px">📅</span>
          <div>
            <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#0369a1;text-transform:uppercase;letter-spacing:.08em">Last week's check-in</div>
            <div style="font-family:var(--mono);font-size:9px;color:#0284c7;margin-top:1px">Submitted ${fmtDate(w['Week Ending'])} · new week ends ${fmtDate(a.expectedWeekEnd)}</div>
          </div>
        </div>
      </div>`;
  }

  // Training
  let training = '';
  if (hW) {
    const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
    const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
    const rPct = rp > 0 ? Math.min(100, Math.round(rc / rp * 100)) : 0;
    const lPct = lp > 0 ? Math.min(100, Math.round(lc / lp * 100)) : 0;

    training = `<div class="sec">
      <div class="sec-ttl">${(() => {
        // Show the week the submitted data actually belongs to, not the current week.
        // dataWeekNum = current week minus however many weeks behind the check-in is.
        const submittedEnd = w['Week Ending'];
        let dataWeekNum = a.weekNum;
        if (a.weekNum !== null && submittedEnd) {
          const weeksBehind = Math.round(
            (new Date(currentWeekEnd) - new Date(submittedEnd)) / (7 * 86400000)
          );
          dataWeekNum = Math.max(1, a.weekNum - weeksBehind);
        }
        const label = dataWeekNum === null ? 'Training'
          : dataWeekNum === 0 ? 'Discovery Week Training'
          : `Wk ${dataWeekNum} Training`;
        return `${label} — ending ${fmtDate(submittedEnd) || '?'}`;
      })()}</div>
      <div class="tpair">
        <div class="tb">
          <div class="tt run">Run</div>
          <div class="ts"><strong>${rc}/${rp}</strong> sessions · <strong>${esc(w['Weekly Run KM'] || '—')} km</strong></div>
          <div class="pbar"><div class="pfill run" style="width:${rPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Run Feel /10'] || '—')}/10</strong></div>
          ${isBad(w['Run Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Run Niggles'])}</div>` : ''}
          ${w['Runs Wins'] && w['Runs Wins'] !== 'n/a' ? `<div class="nl"><span class="nl-lbl">✓ Win</span>${esc(w['Runs Wins'])}</div>` : ''}
        </div>
        <div class="tb">
          <div class="tt str">Lift</div>
          <div class="ts"><strong>${lc}/${lp}</strong> sessions</div>
          <div class="pbar"><div class="pfill str" style="width:${lPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Lift Feel /10'] || '—')}/10</strong></div>
          ${isBad(w['Lifts Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Lifts Niggles'])}</div>` : ''}
          ${w['Lift Wins'] && w['Lift Wins'] !== 'n/a' ? `<div class="nl"><span class="nl-lbl">✓ Win</span>${esc(w['Lift Wins'])}</div>` : ''}
        </div>
      </div>
      ${w['Testimonial'] ? `<div class="testim">"${esc(w['Testimonial'])}"</div>` : ''}
      ${w['Upcoming Impact'] && w['Upcoming Impact'] !== 'n/a' ? `<div class="impact">⚡ ${esc(w['Upcoming Impact'])}</div>` : ''}
    </div>`;
  }

  // Body
  let bodyHtml = '';
  if (a.bAvg.wt !== undefined || a.bAvg.sleep !== null) {
    const bLast = [...a.body].sort((x, y) =>
      (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1)[0];
    const bn = bLast?.Notes;
    bodyHtml = `<div class="sec">
      <div class="sec-ttl">Body — 7-day avg</div>
      <div class="body-grid">
        ${a.bAvg.wt !== undefined ? `<div><div class="wnum">${esc(a.bAvg.wt)}<span class="wunit">kg</span></div><div class="wdate">${fmtDate(a.bAvg.wtd)}</div></div>` : ''}
        <div class="bmet">
          ${[{l:'Sleep',v:a.bAvg.sleep},{l:'Energy',v:a.bAvg.energy},{l:'Stress',v:a.bAvg.stress},{l:'Sore',v:a.bAvg.soreness}].map(m =>
            `<div class="bm"><div class="bm-lbl">${m.l}</div><div class="bm-val">${m.v !== null ? m.v : '—'}</div></div>`).join('')}
        </div>
      </div>
      ${bn ? `<div class="bnote">${esc(bn)}</div>` : ''}
    </div>`;
  }

  // Nutrition
  let nutrHtml = '';
  if (a.nAvg.cal !== null) {
    nutrHtml = `<div class="sec">
      <div class="sec-ttl">Nutrition — ${a.nAvg.days}d avg</div>
      <div class="mrow">
        <div class="mc"><div class="mc-lbl">Calories</div><div class="mc-val">${a.nAvg.cal || '—'}</div></div>
        <div class="mc"><div class="mc-lbl">Protein</div><div class="mc-val">${a.nAvg.pro || '—'}<span class="mc-unit">g</span></div></div>
        <div class="mc"><div class="mc-lbl">Carbs</div><div class="mc-val">${a.nAvg.carb || '—'}<span class="mc-unit">g</span></div></div>
        <div class="mc"><div class="mc-lbl">Fats</div><div class="mc-val">${a.nAvg.fat || '—'}<span class="mc-unit">g</span></div></div>
      </div>
    </div>`;
  }

  // Session count (no weekly)
  let sessHtml = '';
  if (!hW && (a.runS.length || a.strS.length)) {
    sessHtml = `<div class="sec">
      <div class="sec-ttl">Sessions (7 days)</div>
      <div class="sess-row">
        <div class="scard"><div class="snum run-c">${a.runS.length}</div><div class="slbl">Run</div></div>
        <div class="scard"><div class="snum str-c">${a.strS.length}</div><div class="slbl">Strength</div></div>
      </div>
    </div>`;
  }

  // Call Prep
  const callPrep = buildCallPrep(a);
  const cpId = `cp-${a.id.replace(/\s+/g,'-')}`;
  const savedNote = callNotes[a.id] || '';
  const callPrepHtml = `
    <div class="call-prep">
      <div class="cp-header" onclick="toggleCallPrep('${cpId}')">
        <div class="cp-title"><span class="cp-icon">📋</span> Call Prep</div>
        <span class="cp-toggle" id="${cpId}-toggle">▼</span>
      </div>
      <div class="cp-body" id="${cpId}">
        ${callPrep.wins.length ? `
          <div class="cp-block">
            <div class="cp-block-lbl win">✓ Open With (Wins)</div>
            <div class="cp-items">${callPrep.wins.map(t => `<div class="cp-item win">${esc(t)}</div>`).join('')}</div>
          </div>` : ''}
        ${callPrep.issues.length ? `
          <div class="cp-block">
            <div class="cp-block-lbl issue">⚠ Address</div>
            <div class="cp-items">${callPrep.issues.map(t => `<div class="cp-item issue">${esc(t)}</div>`).join('')}</div>
          </div>` : ''}
        ${callPrep.ask.length ? `
          <div class="cp-block">
            <div class="cp-block-lbl ask">→ Ask / Follow Up</div>
            <div class="cp-items">${callPrep.ask.map(t => `<div class="cp-item ask">${esc(t)}</div>`).join('')}</div>
          </div>` : ''}
        ${!callPrep.wins.length && !callPrep.issues.length && !callPrep.ask.length ? `<div class="cp-none">No check-in data to prep from yet.</div>` : ''}
        <div class="cp-block">
          <div class="cp-block-lbl note-lbl">📝 Call Notes</div>
          <textarea class="cp-note" placeholder="Notes for this call…" onchange="saveNote('${a.id}', this.value)">${esc(savedNote)}</textarea>
        </div>
      </div>
    </div>`;

  // Card header: always anchored to the same expected week end for all athletes.
  // Three states:
  //  1. hasCurrentCheckin  → "Week ending DD-MM"           (normal, this week's data)
  //  2. hasLastWeekCheckin → "Last wk · wk ends DD-MM"     (soft amber — submitted recently but new week started)
  //  3. isStale            → "No check-in · wk ends DD-MM · last DD-MM"  (red warning)
  let metaText;
  const wkEndDisplay = fmtDate(a.expectedWeekEnd);
  if (a.hasCurrentCheckin) {
    metaText = `Week ending ${wkEndDisplay}`;
  } else if (a.hasLastWeekCheckin && hW) {
    metaText = `Submitted ${fmtDate(w['Week Ending'])} · wk ends ${wkEndDisplay}`;
  } else if (hW) {
    const lastStr = ` · last ${fmtDate(w['Week Ending'])}`;
    metaText = `No check-in — wk ends ${wkEndDisplay}${lastStr}`;
  } else {
    metaText = a.body.length ? 'Daily tracking only' : 'No recent data';
  }

  return `<div class="card ${bcls}" data-card="${esc(a.id)}" data-alert="${a.alertScore}" data-name="${esc(a.id)}" data-week="${a.weekNum ?? 0}" data-compliance="${a.compliance ?? 0}" data-checkin="${w?.['Week Ending'] || ''}">
    <div class="card-head">
      <div class="card-head-top">
        <div>
          <div class="aname">${esc(a.id)}</div>
          <div class="ameta ${a.isStale ? 'nocheckin' : ''}">${metaText}</div>
        </div>
        ${a.weekNum !== null ? `<div class="week-badge"><div class="wk-num">${a.weekNum}</div><div class="wk-lbl">${a.weekNum === 0 ? 'Discovery' : 'Week'}</div></div>` : ''}
      </div>
      ${a.flags.length ? `<div class="flags">${fps}</div>` : ''}
    </div>
    ${staleBanner}${compBar}${scores}${training}${bodyHtml}${nutrHtml}${sessHtml}
    <div class="ai-sec"></div>
    ${callPrepHtml}
  </div>`;
}

// ── Call Prep Builder ─────────────────────────────────────────────────────────
function buildCallPrep(a) {
  const w = a.weekly;
  const wins = [], issues = [], ask = [];

  if (w) {
    // Wins
    if (w['Runs Wins'] && isBad(w['Runs Wins'])) wins.push('Running: ' + w['Runs Wins']);
    if (w['Lift Wins'] && isBad(w['Lift Wins'])) wins.push('Lifting: ' + w['Lift Wins']);
    if (w['Testimonial'] && isBad(w['Testimonial'])) wins.push(`"${w['Testimonial']}"`);

    const rf = parseInt(w['Run Feel /10']);
    const lf = parseInt(w['Lift Feel /10']);
    if (rf >= 8) wins.push(`Strong run feel this week (${rf}/10)`);
    if (lf >= 8) wins.push(`Strong lift feel this week (${lf}/10)`);

    const energy = parseInt(w['Energy /10']);
    if (energy >= 8) wins.push(`High energy (${energy}/10)`);

    // Issues
    if (isBad(w['Run Niggles'])) issues.push('Run niggle: ' + w['Run Niggles']);
    if (isBad(w['Lifts Niggles'])) issues.push('Lift niggle: ' + w['Lifts Niggles']);

    const stress = parseInt(w['Stress']);
    if (stress >= 8) issues.push(`High stress score (${stress}/10) — check in on life load`);
    else if (stress >= 6) issues.push(`Elevated stress (${stress}/10)`);

    const motiv = parseInt(w['Motivation']);
    if (motiv && motiv <= 4) issues.push(`Low motivation (${motiv}/10) — explore why`);
    else if (motiv && motiv <= 6) issues.push(`Below-average motivation (${motiv}/10)`);

    const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
    const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
    if (rp > 0 && rc < rp) issues.push(`Missed ${rp - rc} of ${rp} planned runs`);
    if (lp > 0 && lc < lp) issues.push(`Missed ${lp - lc} of ${lp} planned lifts`);

    const nutrAdh = parseInt(w['Nutrition Adherence /10']);
    if (nutrAdh && nutrAdh <= 5) issues.push(`Low nutrition adherence (${nutrAdh}/10)`);

    // Ask / Follow-up
    if (isBad(w['Upcoming Impact'])) ask.push('Upcoming impact: ' + w['Upcoming Impact']);
    if (isBad(w['Social Event Upcoming'])) ask.push('Social event coming up: ' + w['Social Event Upcoming']);
    if (isBad(w['Fuelling'])) ask.push('Fuelling note: ' + w['Fuelling']);
    if (isBad(w['Notes'])) ask.push('Their notes: ' + w['Notes']);
  }

  // From body notes
  if (a.body.length) {
    const bSorted = [...a.body].sort((x, y) =>
      (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1);
    const bn = bSorted[0]?.Notes;
    if (isBad(bn) && !ask.some(i => i.includes(bn))) ask.push('Recent body note: ' + bn);
  }

  return { wins, issues, ask };
}

// ── Coach Card ────────────────────────────────────────────────────────────────
function buildCoachCard(a) {
  const w = a.weekly;
  const hW = !!w?.Name;

  // Scores
  let scores = '';
  if (hW) {
    const sx = [
      { l: 'Energy',  v: w['Energy /10'],             inv: false },
      { l: 'Sleep',   v: w['Sleep hrs'],               inv: false },
      { l: 'Sore',    v: w['Soreness /10'],            inv: true  },
      { l: 'Stress',  v: w['Stress'],                  inv: true  },
      { l: 'Motiv',   v: w['Motivation'],              inv: false },
      { l: 'Nutr',    v: w['Nutrition Adherence /10'], inv: false },
    ];
    scores = `<div class="coach-scores">${sx.map(x =>
      `<div class="sc"><div class="sc-lbl">${esc(x.l)}</div><div class="sc-val ${scoreClass(x.v, x.inv)}">${esc(x.v) || '—'}</div></div>`
    ).join('')}</div>`;
  }

  // Training
  let trainingHtml = '';
  if (hW) {
    const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
    const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
    const rPct = rp > 0 ? Math.min(100, Math.round(rc / rp * 100)) : 0;
    const lPct = lp > 0 ? Math.min(100, Math.round(lc / lp * 100)) : 0;

    trainingHtml = `<div class="coach-training">
      <div class="coach-training-lbl">Training — week ending ${fmtDate(w['Week Ending']) || '?'}</div>
      <div class="tpair">
        <div class="tb">
          <div class="tt run">Run</div>
          <div class="ts"><strong>${rc}/${rp}</strong> sessions · <strong>${esc(w['Weekly Run KM'] || '—')} km</strong></div>
          <div class="pbar"><div class="pfill run" style="width:${rPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Run Feel /10'] || '—')}/10</strong></div>
          ${isBad(w['Run Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Run Niggles'])}</div>` : ''}
          ${w['Runs Wins'] && w['Runs Wins'] !== 'n/a' ? `<div class="nl"><span class="nl-lbl">✓ Win</span>${esc(w['Runs Wins'])}</div>` : ''}
        </div>
        <div class="tb">
          <div class="tt str">Lift</div>
          <div class="ts"><strong>${lc}/${lp}</strong> sessions</div>
          <div class="pbar"><div class="pfill str" style="width:${lPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Lift Feel /10'] || '—')}/10</strong></div>
          ${isBad(w['Lifts Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Lifts Niggles'])}</div>` : ''}
          ${w['Lift Wins'] && w['Lift Wins'] !== 'n/a' ? `<div class="nl"><span class="nl-lbl">✓ Win</span>${esc(w['Lift Wins'])}</div>` : ''}
        </div>
      </div>
      ${w['Testimonial'] ? `<div class="testim">"${esc(w['Testimonial'])}"</div>` : ''}
      ${w['Upcoming Impact'] && w['Upcoming Impact'] !== 'n/a' ? `<div class="impact">⚡ ${esc(w['Upcoming Impact'])}</div>` : ''}
    </div>`;
  }

  // Body
  let bodyHtml = '';
  if (a.bAvg.wt !== undefined || a.bAvg.sleep !== null) {
    const items = [
      { l: 'Weight', v: a.bAvg.wt !== undefined ? a.bAvg.wt + ' kg' : null },
      { l: 'Sleep',  v: a.bAvg.sleep },
      { l: 'Energy', v: a.bAvg.energy },
      { l: 'Stress', v: a.bAvg.stress },
    ].filter(i => i.v !== null);
    if (items.length) {
      bodyHtml = `<div class="coach-body-row">${items.map(i =>

  let notesHtml = '';
  if (hW && w['Notes'] && isBad(w['Notes'])) {
    notesHtml = `<div class="coach-notes">
      <div class="coach-notes-lbl">Notes</div>
      <div class="coach-quote">${esc(w['Notes'])}</div>
    </div>`;
  }

  const noData = !hW && !a.bAvg.wt && !a.bAvg.sleep;
  const metaTxt = hW
    ? `Week ending ${fmtDate(w['Week Ending'])}`

      </div>

    ${trainingHtml}
    ${bodyHtml}
    ${notesHtml}
    ${noData ? `<div class="coach-no-data"><div class="coach-no-data-txt">No recent data found</div></div>` : ''}

// ── Filters ───────────────────────────────────────────────────────────────────
function setStatusFilter(btn, status) {
  _statusFilter = status;
  document.querySelectorAll('.sf').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const query = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
  const sortBy = document.getElementById('sort-select')?.value || 'alert';

  let visible = _allAthletes;

  // Status filter
  if (_statusFilter === 'red') {
    visible = visible.filter(a => a.flags.some(f => f.t === 'red'));
  } else if (_statusFilter === 'amber') {
    visible = visible.filter(a => !a.flags.some(f => f.t === 'red') && a.flags.some(f => f.t === 'yellow'));
  } else if (_statusFilter === 'green') {
    visible = visible.filter(a => !a.flags.some(f => f.t === 'red') && !a.flags.some(f => f.t === 'yellow'));
  }

  // Search
  if (query) {
    visible = visible.filter(a => a.id.toLowerCase().includes(query));
  }

  // Sort
  if (sortBy === 'name') {
    visible = [...visible].sort((a, b) => a.id.localeCompare(b.id));
  } else if (sortBy === 'week') {
    visible = [...visible].sort((a, b) => (b.weekNum ?? -1) - (a.weekNum ?? -1));
  } else if (sortBy === 'compliance') {
    visible = [...visible].sort((a, b) => (b.compliance ?? -1) - (a.compliance ?? -1));
  } else if (sortBy === 'checkin') {
    visible = [...visible].sort((a, b) => {
      const da = a.weekly?.['Week Ending'] || '';
      const db = b.weekly?.['Week Ending'] || '';
      return db.localeCompare(da);
    });
  } else {
    visible = [...visible].sort((a, b) => b.alertScore - a.alertScore);
  }

  // Show/hide cards
  const cards = document.querySelectorAll('#grid .card');
  const visibleIds = new Set(visible.map(a => a.id));
  cards.forEach(card => {
    const id = card.getAttribute('data-card');
    card.classList.toggle('hidden', !visibleIds.has(id));
  });

  // Sort DOM order
  const grid = document.getElementById('grid');
  visible.forEach(a => {
    const card = grid.querySelector(`[data-card="${a.id}"]`);
    if (card) grid.appendChild(card);
  });

  // No-results message
  document.getElementById('no-results').style.display = visible.length === 0 ? 'block' : 'none';
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  const isAthletes = tab === 'athletes';
  document.getElementById('tab-athletes-content').style.display = isAthletes ? '' : 'none';
  document.getElementById('tab-coaches-content').style.display  = isAthletes ? 'none' : '';
  document.getElementById('filter-bar').style.display           = isAthletes ? '' : 'none';
  document.getElementById('gen-btn').style.display              = isAthletes && _allAthletes.length ? 'block' : 'none';

  document.getElementById('tab-athletes-btn').classList.toggle('active', isAthletes);
  document.getElementById('tab-coaches-btn').classList.toggle('active', !isAthletes);
}

// ── Call Prep toggle ──────────────────────────────────────────────────────────
function toggleCallPrep(id) {
  const body = document.getElementById(id);
  const toggle = document.getElementById(id + '-toggle');
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : '';
  toggle.classList.toggle('open', !isOpen);
}

function saveNote(athleteId, value) {
  callNotes[athleteId] = value;
}

// ── Main load ─────────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  document.getElementById('refresh-btn').disabled = true;

  try {
    const [weekly, sessions, body, nutrition, athleteDb] = await Promise.all([
      fetchDB(DB.weekly), fetchDB(DB.sessions), fetchDB(DB.body),
      fetchDB(DB.nutrition), fetchDB(DB.athletes),
    ]);

    const { athletes, coaches } = buildAll(weekly, sessions, body, nutrition, athleteDb);
    render({ athletes, coaches });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err-msg').textContent = 'Error: ' + e.message;
  } finally {
    document.getElementById('refresh-btn').disabled = false;
  }
}

// ── AI Analysis ───────────────────────────────────────────────────────────────
let _lastAthletes = [];

async function generateAI() {
  if (!_allAthletes.length) return;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '✦ Analysing…';

  document.querySelectorAll('.ai-sec').forEach(sec => {
    sec.innerHTML = `<div class="ai-loading">
      <div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div>
      <span>Generating analysis…</span>
    </div>`;
  });

  try {
    const payload = _allAthletes
      .filter(a => a.weekly || a.bAvg?.wt != null)
      .map(a => ({ id: a.id, weekly: a.weekly, bAvg: a.bAvg, nAvg: a.nAvg }));

    const res = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ athletes: payload }),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${res.status}`);
    }

    const { analyses, squadBrief } = await res.json();

    analyses.forEach(analysis => {
      const sec = document.querySelector(`[data-card="${analysis.id}"] .ai-sec`);
      if (!sec) return;
      sec.innerHTML = `
        <div class="ai-status-badge ${analysis.status}">${analysis.status}</div>
        <div class="ai-flags">${(analysis.flags || []).map(f => `<div class="ai-flag">${esc(f)}</div>`).join('')}</div>
        <div class="ai-rec">${esc(analysis.recommendation)}</div>`;
    });

    if (squadBrief) {
      document.getElementById('squad-brief-text').textContent = squadBrief;
      document.getElementById('squad-brief').classList.add('visible');
    }
    btn.textContent = '✦ Regenerate';
  } catch (e) {
    document.querySelectorAll('.ai-sec').forEach(sec => {
      sec.innerHTML = `<div class="ai-loading" style="color:var(--alert)">${esc(e.message)}</div>`;
    });
    btn.textContent = '✦ Retry';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', load);
document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('gen-btn').addEventListener('click', generateAI);
</script>

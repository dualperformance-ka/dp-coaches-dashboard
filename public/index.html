<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaches Dashboard — Dual Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #141417;
  --bg3: #1a1a1f;
  --surface: #1e1e24;
  --surface2: #25252c;
  --surface3: #2c2c35;
  --border: rgba(255,255,255,.07);
  --border-mid: rgba(255,255,255,.12);
  --text: #f0f0f0;
  --muted: #888;
  --dim: #555;

  --run: #f97316;
  --run-dim: rgba(249,115,22,.15);
  --str: #6366f1;
  --str-dim: rgba(99,102,241,.15);

  --ok: #22c55e;
  --ok-dim: rgba(34,197,94,.12);
  --warn: #eab308;
  --warn-dim: rgba(234,179,8,.12);
  --alert: #ef4444;
  --alert-dim: rgba(239,68,68,.12);
  --info: #38bdf8;

  --win-bg: rgba(34,197,94,.1);
  --win-border: rgba(34,197,94,.25);
  --win-text: #4ade80;

  --flag-bg: rgba(239,68,68,.1);
  --flag-border: rgba(239,68,68,.25);
  --flag-text: #f87171;

  --mono: 'JetBrains Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --body-font: 'Barlow', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body-font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ── Header ── */
header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  gap: 14px;
  backdrop-filter: blur(10px);
}
.logo {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
}
.logo .d { color: #fff; }
.logo .sep { color: var(--dim); font-weight: 400; margin: 0 4px; }
.logo .p { color: rgba(255,255,255,.25); }
.h-mid {
  font-family: var(--mono);
  font-size: 9px;
  color: rgba(255,255,255,.25);
  text-transform: uppercase;
  letter-spacing: .14em;
  white-space: nowrap;
}
.h-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.updated {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  white-space: nowrap;
}
.btn {
  background: transparent;
  border: 1px solid var(--border-mid);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: .07em;
  transition: all .15s;
  white-space: nowrap;
}
.btn:hover { border-color: rgba(255,255,255,.3); color: var(--text); }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn.primary {
  background: rgba(99,102,241,.15);
  border-color: rgba(99,102,241,.4);
  color: #a5b4fc;
}
.btn.primary:hover { background: rgba(99,102,241,.25); border-color: rgba(99,102,241,.7); color: #c7d2fe; }
.btn.loading {
  background: rgba(99,102,241,.2);
  border-color: rgba(99,102,241,.5);
  color: #818cf8;
  animation: pulse-border 1.4s infinite;
}
@keyframes pulse-border {
  0%, 100% { border-color: rgba(99,102,241,.4); }
  50% { border-color: rgba(99,102,241,.8); }
}

/* ── Layout ── */
.main {
  padding: 16px 16px 60px;
  max-width: 1500px;
  margin: 0 auto;
}

/* ── Loading / Error ── */
.state-box { text-align: center; padding: 80px 20px; }
.dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 14px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--surface3); animation: blink 1.4s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
.state-txt {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .1em;
}

/* ── Summary Bar ── */
.summary-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 18px;
  min-width: 100px;
  flex: 1;
  min-width: 90px;
  max-width: 160px;
  transition: border-color .15s;
}
.sum-card:hover { border-color: var(--border-mid); }
.sum-num {
  font-family: var(--cond);
  font-size: 30px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 2px;
}
.sum-num.red { color: var(--alert); }
.sum-num.grn { color: var(--ok); }
.sum-num.run-c { color: var(--run); }
.sum-num.str-c { color: var(--str); }
.sum-num.warn-c { color: var(--warn); }
.sum-lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .09em;
}

/* ── Week Summary Banner ── */
.week-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 16px;
  display: none;
}
.week-summary.visible { display: block; }
.ws-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.ws-title {
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 7px;
}
.ws-title span { color: var(--str); }
.ws-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 700px) { .ws-cols { grid-template-columns: 1fr; } }
.ws-col { display: flex; flex-direction: column; gap: 6px; }
.ws-col-ttl {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 2px;
}
.ws-win {
  background: var(--win-bg);
  border: 1px solid var(--win-border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12.5px;
  color: var(--win-text);
  line-height: 1.4;
}
.ws-win strong { font-weight: 700; color: #86efac; }
.ws-flag {
  background: var(--flag-bg);
  border: 1px solid var(--flag-border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12.5px;
  color: var(--flag-text);
  line-height: 1.4;
}
.ws-flag strong { font-weight: 700; color: #fca5a5; }
.ws-ai-text {
  font-size: 13px;
  color: rgba(255,255,255,.7);
  line-height: 1.65;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
  gap: 10px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .15s;
}
.card:hover { border-color: var(--border-mid); }
.card.red { border-color: rgba(239,68,68,.35); }
.card.yellow { border-color: rgba(234,179,8,.3); }

/* ── Card Header ── */
.card-head {
  background: var(--bg3);
  padding: 13px 15px 11px;
  border-bottom: 1px solid var(--border);
}
.card-head-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.aname {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: #fff;
  line-height: 1;
}
.ameta {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .09em;
  margin-top: 4px;
}
.ameta.nocheckin { color: rgba(239,68,68,.6); }
.week-badge {
  text-align: center;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 9px;
  padding: 5px 12px;
  flex-shrink: 0;
}
.wk-num {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  letter-spacing: -.01em;
}
.wk-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-top: 2px;
}

/* ── Flags ── */
.flags { display: flex; flex-wrap: wrap; gap: 4px; }
.fp {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.fp.red { background: var(--flag-bg); color: var(--flag-text); border: 1px solid var(--flag-border); }
.fp.yellow { background: rgba(234,179,8,.1); color: #fbbf24; border: 1px solid rgba(234,179,8,.3); }
.fp.green { background: var(--win-bg); color: var(--win-text); border: 1px solid var(--win-border); }
.fp.blue { background: rgba(56,189,248,.1); color: #7dd3fc; border: 1px solid rgba(56,189,248,.25); }

/* ── Scores Row ── */
.scores {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.sc {
  flex: 1;
  padding: 8px 3px;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
}
.sc:last-child { border-right: none; }
.sc-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}
.sc-val {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 800;
  line-height: 1;
}
.sc-val.good { color: var(--ok); }
.sc-val.mid { color: var(--warn); }
.sc-val.bad { color: var(--alert); }
.sc-val.n { color: var(--muted); }
.sc-trend {
  font-family: var(--mono);
  font-size: 8px;
  position: absolute;
  top: 6px;
  right: 4px;
}
.sc-trend.up { color: var(--ok); }
.sc-trend.dn { color: var(--alert); }

/* ── Sections ── */
.sec {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
}
.sec:last-child { border-bottom: none; }
.sec-ttl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-ttl-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sec-ttl-dot.run { background: var(--run); }
.sec-ttl-dot.str { background: var(--str); }
.sec-ttl-dot.body { background: var(--info); }
.sec-ttl-dot.nutr { background: var(--ok); }

/* ── Training pair ── */
.tpair { display: flex; gap: 8px; }
.tb {
  flex: 1;
  background: var(--surface2);
  border-radius: 9px;
  padding: 9px 10px;
  border: 1px solid var(--border);
}
.tt {
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.tt.run { color: var(--run); }
.tt.str { color: var(--str); }
.tt-icon { font-size: 12px; }
.ts {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  line-height: 1.7;
}
.ts strong { color: var(--text); font-weight: 600; }
.ts .hi { color: var(--run); font-weight: 600; }
.ts .his { color: var(--str); font-weight: 600; }

/* ── Progress bar ── */
.pbar {
  height: 3px;
  background: rgba(255,255,255,.08);
  border-radius: 2px;
  overflow: hidden;
  margin: 5px 0;
}
.pfill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.pfill.run { background: var(--run); }
.pfill.str { background: var(--str); }
.pfill.full { background: var(--ok); }

/* ── Notes / Niggles / Wins ── */
.nl {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  margin-top: 5px;
  border-radius: 5px;
  padding: 4px 7px;
}
.nl-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .06em;
  display: block;
  margin-bottom: 1px;
}
.nl.red { color: var(--alert); background: var(--alert-dim); border-left: 2px solid var(--alert); }
.nl.green { color: var(--win-text); background: var(--win-bg); border-left: 2px solid var(--ok); }
.nl.amber { color: #fbbf24; background: var(--warn-dim); border-left: 2px solid var(--warn); }

.testim {
  font-size: 11px;
  color: rgba(255,255,255,.55);
  font-style: italic;
  line-height: 1.5;
  padding: 7px 10px;
  background: rgba(255,255,255,.03);
  border-radius: 6px;
  border-left: 2px solid rgba(255,255,255,.12);
  margin-top: 7px;
}
.impact {
  font-size: 11px;
  color: #fbbf24;
  margin-top: 5px;
  padding: 4px 8px;
  background: var(--warn-dim);
  border-radius: 5px;
  border-left: 2px solid var(--warn);
}

/* ── Strength Highlights ── */
.str-prs {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 5px;
}
.pr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px;
  background: rgba(99,102,241,.08);
  border: 1px solid rgba(99,102,241,.18);
  border-radius: 6px;
  gap: 8px;
}
.pr-move {
  font-family: var(--mono);
  font-size: 9px;
  color: #a5b4fc;
  text-transform: uppercase;
  letter-spacing: .04em;
  flex: 1;
}
.pr-val {
  font-family: var(--cond);
  font-size: 15px;
  font-weight: 800;
  color: #c7d2fe;
}
.pr-badge {
  font-family: var(--mono);
  font-size: 7px;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.pr-badge.pb { background: rgba(250,204,21,.15); color: #fde68a; border: 1px solid rgba(250,204,21,.3); }
.pr-badge.strong { background: rgba(34,197,94,.1); color: #86efac; border: 1px solid rgba(34,197,94,.25); }

/* ── Body Section ── */
.body-grid {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.wnum {
  font-family: var(--cond);
  font-size: 30px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.01em;
}
.wunit {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  margin-left: 2px;
}
.wdate { font-family: var(--mono); font-size: 8px; color: var(--dim); margin-top: 2px; }
.bmet { flex: 1; display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.bm { text-align: center; }
.bm-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}
.bm-val {
  font-family: var(--cond);
  font-size: 18px;
  font-weight: 700;
}
.bm-val.good { color: var(--ok); }
.bm-val.mid { color: var(--warn); }
.bm-val.bad { color: var(--alert); }
.bnote {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  margin-top: 7px;
  border-left: 2px solid var(--alert);
  padding-left: 6px;
  line-height: 1.5;
}

/* ── Nutrition ── */
.nutr-grid { display: flex; gap: 5px; flex-wrap: wrap; }
.mc {
  flex: 1;
  background: var(--surface2);
  border-radius: 7px;
  padding: 7px 9px;
  text-align: center;
  border: 1px solid var(--border);
  min-width: 55px;
  position: relative;
}
.mc-lbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}
.mc-val {
  font-family: var(--cond);
  font-size: 19px;
  font-weight: 700;
  line-height: 1;
}
.mc-unit { font-family: var(--mono); font-size: 8px; color: var(--dim); }
.mc-status {
  font-family: var(--mono);
  font-size: 7px;
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.mc-status.over { color: var(--alert); }
.mc-status.under { color: var(--warn); }
.mc-status.good { color: var(--ok); }
.mc.highlight { border-color: rgba(34,197,94,.3); background: rgba(34,197,94,.05); }
.mc.flag-over { border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.05); }
.mc.flag-under { border-color: rgba(234,179,8,.3); background: rgba(234,179,8,.05); }

.nutr-note {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.5;
}
.nutr-note strong { color: var(--text); }

/* ── Macro targets comparison bar ── */
.macro-compare {
  margin-top: 7px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mcomp-row { display: flex; align-items: center; gap: 7px; }
.mcomp-lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  width: 44px;
  text-transform: uppercase;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.mcomp-track {
  flex: 1;
  height: 5px;
  background: rgba(255,255,255,.07);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.mcomp-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s;
}
.mcomp-fill.good { background: var(--ok); }
.mcomp-fill.over { background: var(--alert); }
.mcomp-fill.under { background: var(--warn); }
.mcomp-val {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  width: 55px;
  text-align: right;
  flex-shrink: 0;
}

/* ── Session count ── */
.sess-row { display: flex; gap: 7px; margin-bottom: 4px; }
.scard {
  background: var(--surface2);
  border-radius: 8px;
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
  flex: 1;
}
.snum {
  font-family: var(--cond);
  font-size: 24px;
  font-weight: 800;
  line-height: 1;
}
.snum.run-c { color: var(--run); }
.snum.str-c { color: var(--str); }
.slbl {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-top: 2px;
}

/* ── AI Analysis Section ── */
.ai-sec {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  background: rgba(99,102,241,.03);
}
.ai-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.ai-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 3px 10px;

<body>

<header>
  <div class="logo"><span class="d">DUAL</span><span class="sep">/</span><span class="p">PERFORMANCE</span></div>

  </div>

          <div class="ws-col-ttl">✦ Squad Wins This Week</div>
          <div id="ws-wins"></div>
        </div>

    <div class="grid" id="grid"></div>

</div>

<script>
// ── Database IDs ──────────────────────────────────────────────────────────────
const DB = {
  weekly:    '33e5a96c-c70b-8049-b696-d22e5920e0ee',
  sessions:  '1c55a96c-c70b-825b-9bdf-819abea4ef7c',
  body:      '3405a96c-c70b-80a4-b1b9-cf5b9c236f18',
  nutrition: '3405a96c-c70b-804b-aa9c-f165f2d2e0e9',
  athletes:  '4a25a96c-c70b-82ff-a679-0139eaa8b458',
};

const ALIASES = { 'JACOB TUAZON': 'JACOB' };

// Macro targets per athlete (kg bodyweight * factor, or set fixed)
// Update this with your athlete targets. Falls back to generic ~75kg defaults.
const MACRO_TARGETS = {
  // 'ATHLETE_NAME': { cal: 2400, pro: 170, carb: 250, fat: 70 }
  // Or set as null to use defaults
};
const DEFAULT_TARGETS = { cal: 2200, pro: 160, carb: 220, fat: 65 };

// ── Helpers ───────────────────────────────────────────────────────────────────
function nid(s) {
  if (!s) return null;
  const u = s.toUpperCase().trim();
  return ALIASES[u] || u;
}
function sid(r) {
  const code = r['Athlete Code'];
  if (code) return nid(code);
  const name = (r.Name || '').split('—')[0].trim();
  return name ? nid(name) : null;
}
function avg(arr, k) {
  const v = arr.map(r => parseFloat(r[k])).filter(x => !isNaN(x));
  return v.length ? (v.reduce((a, b) => a + b, 0) / v.length).toFixed(1) : null;
}
function dago(n) { const d = new Date(); d.setDate(d.getDate() - n); return d; }
function scoreClass(v, inv) {
  const n = parseFloat(v);
  if (isNaN(n)) return 'n';
  if (inv) return n >= 8 ? 'bad' : n >= 6 ? 'mid' : 'good';
  return n >= 7.5 ? 'good' : n >= 5 ? 'mid' : 'bad';
}
function bmClass(lbl, v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  const inv = ['stress','sore','soreness'].includes(lbl.toLowerCase());
  if (inv) return n >= 8 ? 'bad' : n >= 6 ? 'mid' : 'good';
  return n >= 7.5 ? 'good' : n >= 5 ? 'mid' : 'bad';
}
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = String(s).split('T')[0].split('-');
  if (!y || !m || !d) return s;
  return `${d}-${m}-${y}`;
}
function pct(v, t) {
  if (!v || !t) return 0;
  return Math.min(120, Math.round((parseFloat(v) / parseFloat(t)) * 100));
}
function macroStatus(v, t) {
  if (!v || !t) return '';
  const p = parseFloat(v) / parseFloat(t);
  if (p > 1.12) return 'over';
  if (p < 0.88) return 'under';
  return 'good';
}
function macroStatusLabel(v, t) {
  if (!v || !t) return '';
  const p = parseFloat(v) / parseFloat(t);
  if (p > 1.12) return `+${Math.round((p-1)*100)}%`;
  if (p < 0.88) return `-${Math.round((1-p)*100)}%`;
  return 'On Target';
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchDB(dbId) {
  const res = await fetch(`/api/notion?db=${dbId}`);
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
  const data = await res.json();
  return data.results || [];
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  document.getElementById('refresh-btn').disabled = true;

  try {
    const [weekly, sessions, body, nutrition, athleteDb] = await Promise.all([
      fetchDB(DB.weekly), fetchDB(DB.sessions), fetchDB(DB.body),
      fetchDB(DB.nutrition), fetchDB(DB.athletes),
    ]);
    const athletes = buildAthletes(weekly, sessions, body, nutrition, athleteDb);
    _lastAthletes = athletes;
    render(athletes);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err-msg').textContent = 'Error: ' + e.message;
  } finally {
    document.getElementById('refresh-btn').disabled = false;
  }
}

// ── Build Athletes ─────────────────────────────────────────────────────────────
function buildAthletes(weekly, sessions, body, nutrition, athleteDb = []) {
  const c14 = dago(14), c7 = dago(7);
  const map = {};

  function ens(id) {
    if (!id || id.length < 2) return;
    if (!map[id]) map[id] = { id, weekly: null, body: [], nutrition: [], sessions: [] };
  }

  const startDates = {};
  athleteDb.forEach(r => {
    const code = nid(r.Code || r.Athlete);
    const sd = r['date:Start Date:start'] || r['Start Date'];
    if (code && sd) startDates[code] = sd;
  });

  const WEEK_OVERRIDES = { 'KARL': 7, 'JACOB': 7, 'KHANG': 7 };

  function calcWeekNum(id) {
    if (WEEK_OVERRIDES.hasOwnProperty(id)) return WEEK_OVERRIDES[id];
    const sd = startDates[id];
    if (!sd) return null;
    const diffDays = Math.floor((Date.now() - new Date(sd)) / 86400000);
    return Math.max(0, Math.floor(diffDays / 7));
  }

  // Weekly — keep latest + previous for trend
  const wl = {}, wlPrev = {};
  const wAll = {};
  weekly.forEach(r => {
    const id = nid(r.Name);
    if (!id || !r['Week Ending']) return;
    if (!wAll[id]) wAll[id] = [];
    wAll[id].push(r);
  });
  Object.entries(wAll).forEach(([id, records]) => {
    const sorted = records.sort((a, b) => (b['Week Ending'] > a['Week Ending'] ? 1 : -1));
    ens(id);
    map[id].weekly = sorted[0] || null;
    map[id].weeklyPrev = sorted[1] || null;
    wl[id] = sorted[0];
    wlPrev[id] = sorted[1];
  });

  body.forEach(r => {
    const id = nid(r.AthleteID); if (!id) return; ens(id);
    const d = r['date:Date:start'] || r.Date;
    if (d && new Date(d) >= c14) map[id].body.push(r);
  });

  nutrition.forEach(r => {
    const id = nid(r.AthleteID); if (!id) return; ens(id);
    const d = r['date:Date:start'] || r.Date;
    if (d && new Date(d) >= c14) map[id].nutrition.push(r);
  });

  const seen = new Set();
  sessions.forEach(r => {
    const id = sid(r);
    if (!id || !map[id]) return;
    const ds = ((r.Date || r['Submitted At'] || r._createdTime || '')).split('T')[0];
    if (!ds || new Date(ds) < c14) return;
    const k = `${id}|${r.Session || ''}|${r['Session Category'] || ''}|${ds}`;
    if (!seen.has(k)) { seen.add(k); map[id].sessions.push({ ...r, _d: ds }); }
  });

  return Object.values(map).map(a => {
    const b7 = a.body.filter(r => new Date(r['date:Date:start'] || r.Date) >= c7);
    const n7 = a.nutrition.filter(r => new Date(r['date:Date:start'] || r.Date) >= c7);
    const bSorted = [...a.body].sort((x, y) =>
      (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1);
    const bLast = bSorted[0];

    const bAvg = {
      wt: bLast?.Weight, wtd: bLast?.['date:Date:start'] || bLast?.Date,
      sleep: avg(b7, 'Sleep Score'), energy: avg(b7, 'Energy'),
      stress: avg(b7, 'Stress'), soreness: avg(b7, 'Soreness'),
    };
    const nAvg = {
      cal: avg(n7, 'Calories'), pro: avg(n7, 'Protein'),
      carb: avg(n7, 'Carbs'), fat: avg(n7, 'Fats'), days: n7.length,
    };

    const s7 = a.sessions.filter(s => new Date(s._d) >= c7);
    const runS = s7.filter(s => ['Running','Run'].includes(s['Session Category']));
    const strS = s7.filter(s => s['Session Category'] === 'Strength');

    // Extract strength highlights from session notes
    const strHighlights = [];
    strS.forEach(s => {
      const notes = s.Notes || s['Session Notes'] || s.Details || '';
      const lifts = ['squat','bench','deadlift','press','rdl','row','pull','lunge','hip thrust'];
      lifts.forEach(lift => {
        const m = notes.toLowerCase().match(new RegExp(`(\\d+(?:\\.\\d)?\\s*(?:kg|lb|x)\\s*)?(?:[x×]\\s*\\d+\\s*)?${lift}\\w*[^.]*`, 'i'));
        if (m && m[0].length > 4) {
          const kg = notes.match(/(\d+(?:\\.\\d)?)\s*kg/i);
          if (kg) strHighlights.push({ lift: lift.charAt(0).toUpperCase()+lift.slice(1), val: kg[1]+'kg', isPB: notes.toLowerCase().includes('pb') || notes.toLowerCase().includes('personal best') });
        }
      });
    });

    // Trend vs previous week
    const pw = a.weeklyPrev;
    const trends = {};
    if (pw && a.weekly) {
      ['Energy /10', 'Sleep hrs', 'Soreness /10', 'Stress', 'Motivation'].forEach(k => {
        const cur = parseFloat(a.weekly[k]), prev = parseFloat(pw[k]);
        if (!isNaN(cur) && !isNaN(prev)) trends[k] = cur > prev ? 'up' : cur < prev ? 'dn' : '';
      });
    }

    // Alert flags
    const flags = [];
    const w = a.weekly;
    if (w) {
      const nig = ((w['Run Niggles'] || '') + ' ' + (w['Lifts Niggles'] || '')).toLowerCase();
      if (['lingering','niggle','pain','tight','strain','physio','injury'].some(k => nig.includes(k)))
        flags.push({ t: 'red', l: 'Niggle' });

      const st = parseInt(w.Stress);
      if (st >= 8) flags.push({ t: 'red', l: 'Stress ' + st });
      else if (st >= 6) flags.push({ t: 'yellow', l: 'Stress ' + st });

      const mo = parseInt(w.Motivation);
      if (mo && mo <= 5) flags.push({ t: 'yellow', l: 'Low Motiv ' + mo });

      const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
      if (rp > 0 && rc < rp) flags.push({ t: 'yellow', l: `Run ${rc}/${rp}` });

      const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
      if (lp > 0 && lc < lp) flags.push({ t: 'yellow', l: `Lift ${lc}/${lp}` });

      const rf = parseInt(w['Run Feel /10']);
      if (rf >= 8) flags.push({ t: 'green', l: 'Run Feel ' + rf });

      // Macro flag — low protein
      if (nAvg.pro && parseFloat(nAvg.pro) < 100) flags.push({ t: 'yellow', l: 'Low Protein' });

      // High sleep quality flag
      if (bAvg.sleep && parseFloat(bAvg.sleep) >= 8) flags.push({ t: 'green', l: 'Great Sleep' });

      // Strength PB flag
      if (strHighlights.some(h => h.isPB)) flags.push({ t: 'blue', l: 'PB 🏆' });
    }

    const recentBn = bSorted.slice(0, 3).map(b => (b.Notes || '').toLowerCase()).join(' ');
    if (!flags.find(f => f.l === 'Niggle') &&
        ['physio','niggle','pain','injury'].some(k => recentBn.includes(k)))
      flags.push({ t: 'yellow', l: 'Body Note' });

    const alertScore =
      flags.filter(f => f.t === 'red').length * 10 +
      flags.filter(f => f.t === 'yellow').length;

    const wkEnd = w?.['Week Ending'] || '';
    const hasRecent = wkEnd >= dago(10).toISOString().split('T')[0];

    // Wins collection
    const wins = [];
    if (w) {
      if (w['Runs Wins'] && !['n/a',''].includes((w['Runs Wins']||'').toLowerCase().trim()))
        wins.push({ type: 'run', text: w['Runs Wins'] });
      if (w['Lift Wins'] && !['n/a',''].includes((w['Lift Wins']||'').toLowerCase().trim()))
        wins.push({ type: 'str', text: w['Lift Wins'] });
      const rf = parseInt(w['Run Feel /10']);
      if (rf >= 9) wins.push({ type: 'run', text: `Run feel ${rf}/10 — outstanding week` });
      const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
      if (rp > 0 && rc >= rp) wins.push({ type: 'run', text: `All ${rc} run sessions completed` });
      const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
      if (lp > 0 && lc >= lp) wins.push({ type: 'str', text: `All ${lc} strength sessions hit` });
    }

    return { ...a, bAvg, nAvg, runS, strS, strHighlights, flags, alertScore, hasRecent, weekNum: calcWeekNum(a.id), trends, wins };
  }).sort((a, b) => b.alertScore - a.alertScore);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(ath) {
  const alertN = ath.filter(a => a.flags.some(f => f.t === 'red')).length;
  const watchN = ath.filter(a => !a.flags.some(f => f.t === 'red') && a.flags.some(f => f.t === 'yellow')).length;
  const winN = ath.filter(a => a.wins?.length > 0).length;
  const totalKm = ath.reduce((s, a) => {
    const k = parseFloat(a.weekly?.['Weekly Run KM'] || 0);
    return s + (isNaN(k) ? 0 : k);
  }, 0);
  const checkedIn = ath.filter(a => a.hasRecent).length;
  const totalStr = ath.reduce((s, a) => s + (a.strS?.length || 0), 0);

  document.getElementById('sum-bar').innerHTML = `
    <div class="sum-card"><div class="sum-num">${ath.length}</div><div class="sum-lbl">Athletes</div></div>
    <div class="sum-card"><div class="sum-num grn">${checkedIn}</div><div class="sum-lbl">Checked In</div></div>
    <div class="sum-card"><div class="sum-num ${alertN ? 'red' : 'grn'}">${alertN}</div><div class="sum-lbl">Need Attention</div></div>
    <div class="sum-card"><div class="sum-num warn-c">${watchN}</div><div class="sum-lbl">Watch</div></div>
    <div class="sum-card"><div class="sum-num run-c">${totalKm.toFixed(0)}</div><div class="sum-lbl">Total KM</div></div>
    <div class="sum-card"><div class="sum-num str-c">${totalStr}</div><div class="sum-lbl">Str Sessions</div></div>
    <div class="sum-card"><div class="sum-num grn">${winN}</div><div class="sum-lbl">Had Wins</div></div>`;

  // Build weekly summary panel
  const allWins = [];
  const allFlags = [];
  ath.forEach(a => {
    (a.wins || []).forEach(w => allWins.push({ athlete: a.id, ...w }));
    a.flags.filter(f => f.t === 'red').forEach(f => allFlags.push({ athlete: a.id, flag: f.l }));
    a.flags.filter(f => f.t === 'yellow').forEach(f => allFlags.push({ athlete: a.id, flag: f.l, soft: true }));
  });

  const winsHtml = allWins.slice(0, 8).map(w =>
    `<div class="ws-win"><strong>${esc(w.athlete)}</strong> — ${esc(w.text)}</div>`
  ).join('') || '<div class="ws-win" style="opacity:.4">No wins logged yet this week</div>';

  const flagsHtml = allFlags.slice(0, 8).map(f =>
    `<div class="ws-flag ${f.soft ? 'style="opacity:.75"' : ''}"><strong>${esc(f.athlete)}</strong> — ${esc(f.flag)}</div>`
  ).join('') || '<div class="ws-flag" style="opacity:.4">No major flags — squad looking solid</div>';

  document.getElementById('ws-wins').innerHTML = winsHtml;
  document.getElementById('ws-flags').innerHTML = flagsHtml;

  const latestWeek = ath.find(a => a.weekly?.['Week Ending'])?.weekly?.['Week Ending'];
  document.getElementById('ws-week-label').textContent =
    latestWeek ? `Week ending ${fmtDate(latestWeek)}` : 'This Week';
  document.getElementById('week-summary').classList.add('visible');

  document.getElementById('grid').innerHTML = ath.map(buildCard).join('');
  document.getElementById('gen-btn').style.display = 'block';
  document.getElementById('squad-brief').classList.remove('visible');
}

// ── Card Builder ──────────────────────────────────────────────────────────────
function buildCard(a) {
  const w = a.weekly;
  const hW = !!w?.Name;
  const hR = a.flags.some(f => f.t === 'red');
  const hY = !hR && a.flags.some(f => f.t === 'yellow');
  const bcls = hR ? 'red' : hY ? 'yellow' : '';
  const fps = a.flags.map(f => `<span class="fp ${f.t}">${esc(f.l)}</span>`).join('');

  // Scores with trends
  let scores = '';
  if (hW) {
    const sx = [
      { l: 'Energy',  v: w['Energy /10'],             inv: false, tk: 'Energy /10' },
      { l: 'Sleep',   v: w['Sleep hrs'],               inv: false, tk: 'Sleep hrs' },
      { l: 'Sore',    v: w['Soreness /10'],            inv: true,  tk: 'Soreness /10' },
      { l: 'Stress',  v: w['Stress'],                  inv: true,  tk: 'Stress' },
      { l: 'Motiv',   v: w['Motivation'],              inv: false, tk: 'Motivation' },
      { l: 'Nutr',    v: w['Nutrition Adherence /10'], inv: false, tk: null },
    ];
    scores = `<div class="scores">${sx.map(x => {
      const tr = x.tk && a.trends?.[x.tk];
      const trHtml = tr ? `<span class="sc-trend ${tr}">${tr === 'up' ? '▲' : '▼'}</span>` : '';
      return `<div class="sc">${trHtml}<div class="sc-lbl">${esc(x.l)}</div><div class="sc-val ${scoreClass(x.v, x.inv)}">${esc(x.v) || '—'}</div></div>`;
    }).join('')}</div>`;
  }

  // Training
  let training = '';
  if (hW) {
    const rp = parseInt(w['Run Planned']) || 0, rc = parseInt(w['Run Completed']) || 0;
    const lp = parseInt(w['Lift Planned']) || 0, lc = parseInt(w['Lift Completed']) || 0;
    const rPct = rp > 0 ? Math.min(100, Math.round(rc / rp * 100)) : 0;
    const lPct = lp > 0 ? Math.min(100, Math.round(lc / lp * 100)) : 0;
    const bad = v => v && !['n/a','','none','nope','nothing','no'].includes((v||'').toLowerCase().trim());

    // Strength highlights from sessions
    const shHtml = a.strHighlights?.length ? `
      <div class="str-prs">
        ${a.strHighlights.slice(0,3).map(h => `
          <div class="pr-row">
            <span class="pr-move">${esc(h.lift)}</span>
            <span class="pr-val">${esc(h.val)}</span>
            ${h.isPB ? '<span class="pr-badge pb">PB</span>' : '<span class="pr-badge strong">↑</span>'}
          </div>`).join('')}
      </div>` : '';

    training = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot run"></div>${a.weekNum !== null ? (a.weekNum === 0 ? 'Discovery Week Training' : `Week ${a.weekNum} Training`) : 'Training'} — ${fmtDate(w['Week Ending']) || '?'}</div>
      <div class="tpair">
        <div class="tb">
          <div class="tt run"><span class="tt-icon">🏃</span>Run</div>
          <div class="ts"><strong class="hi">${rc}/${rp}</strong> sessions · <strong class="hi">${esc(w['Weekly Run KM'] || '—')} km</strong></div>
          <div class="pbar"><div class="pfill ${rPct >= 100 ? 'full' : 'run'}" style="width:${rPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Run Feel /10'] || '—')}/10</strong> · Pace: <strong>${esc(w['Average Pace'] || w['Run Pace'] || '—')}</strong></div>
          ${bad(w['Run Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Run Niggles'])}</div>` : ''}
          ${w['Runs Wins'] && w['Runs Wins'] !== 'n/a' ? `<div class="nl green"><span class="nl-lbl">✦ Win</span>${esc(w['Runs Wins'])}</div>` : ''}
        </div>
        <div class="tb">
          <div class="tt str"><span class="tt-icon">🏋️</span>Strength</div>
          <div class="ts"><strong class="his">${lc}/${lp}</strong> sessions</div>
          <div class="pbar"><div class="pfill ${lPct >= 100 ? 'full' : 'str'}" style="width:${lPct}%"></div></div>
          <div class="ts">Feel: <strong>${esc(w['Lift Feel /10'] || '—')}/10</strong></div>
          ${bad(w['Lifts Niggles']) ? `<div class="nl red"><span class="nl-lbl">⚠ Niggle</span>${esc(w['Lifts Niggles'])}</div>` : ''}
          ${w['Lift Wins'] && w['Lift Wins'] !== 'n/a' ? `<div class="nl green"><span class="nl-lbl">✦ Win</span>${esc(w['Lift Wins'])}</div>` : ''}
          ${shHtml}
        </div>
      </div>
      ${w['Testimonial'] ? `<div class="testim">"${esc(w['Testimonial'])}"</div>` : ''}
      ${w['Upcoming Impact'] && w['Upcoming Impact'] !== 'n/a' ? `<div class="impact">⚡ ${esc(w['Upcoming Impact'])}</div>` : ''}
    </div>`;
  }

  // Body metrics
  let bodyHtml = '';
  if (a.bAvg.wt !== undefined || a.bAvg.sleep !== null) {
    const bLast = [...a.body].sort((x, y) =>
      (y['date:Date:start'] || y.Date || '') > (x['date:Date:start'] || x.Date || '') ? 1 : -1)[0];
    const bn = bLast?.Notes;
    const sleepC = bmClass('sleep', a.bAvg.sleep);
    const energyC = bmClass('energy', a.bAvg.energy);
    const stressC = bmClass('stress', a.bAvg.stress);
    const soreC = bmClass('sore', a.bAvg.soreness);

    bodyHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot body"></div>Body — 7-day avg</div>
      <div class="body-grid">
        ${a.bAvg.wt !== undefined ? `<div><div class="wnum">${esc(a.bAvg.wt)}<span class="wunit">kg</span></div><div class="wdate">${fmtDate(a.bAvg.wtd)}</div></div>` : ''}
        <div class="bmet">
          <div class="bm"><div class="bm-lbl">Sleep</div><div class="bm-val ${sleepC}">${a.bAvg.sleep !== null ? a.bAvg.sleep : '—'}</div></div>
          <div class="bm"><div class="bm-lbl">Energy</div><div class="bm-val ${energyC}">${a.bAvg.energy !== null ? a.bAvg.energy : '—'}</div></div>
          <div class="bm"><div class="bm-lbl">Stress</div><div class="bm-val ${stressC}">${a.bAvg.stress !== null ? a.bAvg.stress : '—'}</div></div>
          <div class="bm"><div class="bm-lbl">Sore</div><div class="bm-val ${soreC}">${a.bAvg.soreness !== null ? a.bAvg.soreness : '—'}</div></div>
        </div>
      </div>
      ${bn ? `<div class="bnote">${esc(bn)}</div>` : ''}
    </div>`;
  }

  // Nutrition with macro targets
  let nutrHtml = '';
  if (a.nAvg.cal !== null) {
    const t = MACRO_TARGETS[a.id] || DEFAULT_TARGETS;
    const calS = macroStatus(a.nAvg.cal, t.cal);
    const proS = macroStatus(a.nAvg.pro, t.pro);
    const carbS = macroStatus(a.nAvg.carb, t.carb);
    const fatS = macroStatus(a.nAvg.fat, t.fat);

    const calPct = Math.min(120, pct(a.nAvg.cal, t.cal));
    const proPct = Math.min(120, pct(a.nAvg.pro, t.pro));
    const carbPct = Math.min(120, pct(a.nAvg.carb, t.carb));
    const fatPct = Math.min(120, pct(a.nAvg.fat, t.fat));

    nutrHtml = `<div class="sec">
      <div class="sec-ttl"><div class="sec-ttl-dot nutr"></div>Nutrition — ${a.nAvg.days}d avg <span style="margin-left:auto;font-size:7px;opacity:.5">vs target</span></div>
      <div class="nutr-grid">
        <div class="mc ${calS === 'good' ? 'highlight' : calS === 'over' ? 'flag-over' : calS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Calories</div>
          <div class="mc-val">${a.nAvg.cal || '—'}</div>
          <div class="mc-status ${calS}">${macroStatusLabel(a.nAvg.cal, t.cal)}</div>
        </div>
        <div class="mc ${proS === 'good' ? 'highlight' : proS === 'over' ? 'flag-over' : proS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Protein</div>
          <div class="mc-val">${a.nAvg.pro || '—'}<span class="mc-unit">g</span></div>
          <div class="mc-status ${proS}">${macroStatusLabel(a.nAvg.pro, t.pro)}</div>
        </div>
        <div class="mc ${carbS === 'good' ? 'highlight' : carbS === 'over' ? 'flag-over' : carbS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Carbs</div>
          <div class="mc-val">${a.nAvg.carb || '—'}<span class="mc-unit">g</span></div>
          <div class="mc-status ${carbS}">${macroStatusLabel(a.nAvg.carb, t.carb)}</div>
        </div>
        <div class="mc ${fatS === 'good' ? 'highlight' : fatS === 'over' ? 'flag-over' : fatS === 'under' ? 'flag-under' : ''}">
          <div class="mc-lbl">Fats</div>
          <div class="mc-val">${a.nAvg.fat || '—'}<span class="mc-unit">g</span></div>
          <div class="mc-status ${fatS}">${macroStatusLabel(a.nAvg.fat, t.fat)}</div>
        </div>
      </div>
      <div class="macro-compare">
        <div class="mcomp-row">
          <span class="mcomp-lbl">Protein</span>
          <div class="mcomp-track"><div class="mcomp-fill ${proS}" style="width:${proPct}%"></div></div>
          <span class="mcomp-val">${a.nAvg.pro || '—'}g / ${t.pro}g</span>
        </div>
        <div class="mcomp-row">
          <span class="mcomp-lbl">Cals</span>
          <div class="mcomp-track"><div class="mcomp-fill ${calS}" style="width:${Math.min(100,calPct)}%"></div></div>
          <span class="mcomp-val">${a.nAvg.cal || '—'} / ${t.cal}</span>
        </div>
        <div class="mcomp-row">
          <span class="mcomp-lbl">Carbs</span>
          <div class="mcomp-track"><div class="mcomp-fill ${carbS}" style="width:${Math.min(100,carbPct)}%"></div></div>
          <span class="mcomp-val">${a.nAvg.carb || '—'}g / ${t.carb}g</span>
        </div>
      </div>
    </div>`;
  }

  // Session count fallback
  let sessHtml = '';
  if (!hW && (a.runS.length || a.strS.length)) {
    sessHtml = `<div class="sec">
      <div class="sec-ttl">Sessions (7 days)</div>
      <div class="sess-row">
        <div class="scard"><div class="snum run-c">${a.runS.length}</div><div class="slbl">Run</div></div>
        <div class="scard"><div class="snum str-c">${a.strS.length}</div><div class="slbl">Strength</div></div>
      </div>
    </div>`;
  }

  const metaText = a.hasRecent
    ? `Week ending ${fmtDate(w?.['Week Ending'])}`
    : hW ? `Last check-in ${fmtDate(w?.['Week Ending'])}`
    : a.body.length ? 'Daily tracking only' : 'No recent data';

  return `<div class="card ${bcls}" data-card="${esc(a.id)}">
    <div class="card-head">
      <div class="card-head-top">
        <div>
          <div class="aname">${esc(a.id)}</div>
          <div class="ameta ${!a.hasRecent ? 'nocheckin' : ''}">${metaText}</div>
        </div>
        ${a.weekNum !== null ? `<div class="week-badge"><div class="wk-num">${a.weekNum}</div><div class="wk-lbl">${a.weekNum === 0 ? 'Discovery' : 'Week'}</div></div>` : ''}
      </div>
      ${a.flags.length ? `<div class="flags">${fps}</div>` : ''}
    </div>
    ${scores}${training}${bodyHtml}${nutrHtml}${sessHtml}
    <div class="ai-sec"></div>
  </div>`;
}

// ── AI Analysis ───────────────────────────────────────────────────────────────
let _lastAthletes = [];

async function generateAI() {
  if (!_lastAthletes.length) return;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '✦ Analysing…';

  document.querySelectorAll('.ai-sec').forEach(sec => {
    sec.innerHTML = `<div class="ai-loading">
      <div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div>
      <span>Generating coaching analysis…</span>
    </div>`;
  });

  try {
    const payload = _lastAthletes
      .filter(a => a.weekly || a.bAvg?.wt != null)
      .map(a => ({
        id: a.id,
        weekNum: a.weekNum,
        weekly: a.weekly,
        weeklyPrev: a.weeklyPrev,
        bAvg: a.bAvg,
        nAvg: a.nAvg,
        strHighlights: a.strHighlights,
        wins: a.wins,
        runSessions: a.runS.length,
        strSessions: a.strS.length,
        flags: a.flags,
      }));

    const res = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        athletes: payload,
        prompt: `You are an expert coach. For each athlete provide:
1. An overall status: GREEN (on track), AMBER (needs watch), or RED (needs immediate attention)
2. wins: array of 1-3 specific wins or positives (be specific about numbers, PRs, consistency)
3. concerns: array of 1-3 things to flag or address (be specific — low protein, missed sessions, niggles)  
4. flags: array of coaching notes (max 3)
5. recommendation: 2-3 sentence personalised coaching note with specific next steps

Focus heavily on: strength training wins/PRs, macro targets vs actuals (especially protein), training completion rates, recovery metrics trends, and any injury flags. Be specific and data-driven. Also provide a squadBrief: overall squad summary in 2-3 sentences highlighting the week's key themes.

Return JSON: { analyses: [{id, status, wins, concerns, flags, recommendation}], squadBrief }`
      }),
    });

    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
    const { analyses, squadBrief } = await res.json();

    analyses.forEach(analysis => {
      const sec = document.querySelector(`[data-card="${analysis.id}"] .ai-sec`);
      if (!sec) return;
      const winsHtml = (analysis.wins || []).map(w => `<div class="ai-win-item">${esc(w)}</div>`).join('');
      const concernsHtml = (analysis.concerns || []).map(c => `<div class="ai-concern-item">${esc(c)}</div>`).join('');
      sec.innerHTML = `
        <div class="ai-header">
          <div class="ai-status-badge ${analysis.status}">${analysis.status}</div>
        </div>
        ${winsHtml ? `<div class="ai-wins">${winsHtml}</div>` : ''}
        ${concernsHtml ? `<div class="ai-concerns">${concernsHtml}</div>` : ''}
        ${(analysis.flags||[]).length ? `<div class="ai-flags">${analysis.flags.map(f=>`<div class="ai-flag">${esc(f)}</div>`).join('')}</div>` : ''}
        <div class="ai-rec">${esc(analysis.recommendation)}</div>`;
    });

    if (squadBrief) {
      document.getElementById('squad-brief-text').textContent = squadBrief;
      document.getElementById('squad-brief').classList.add('visible');
      document.getElementById('ws-ai-text').textContent = squadBrief;
      document.getElementById('ws-ai-text').style.display = 'block';
    }

    btn.textContent = '✦ Regenerate';
  } catch (e) {
    document.querySelectorAll('.ai-sec').forEach(sec => {
      sec.innerHTML = `<div class="ai-loading" style="color:var(--alert)">${esc(e.message)}</div>`;
    });
    btn.textContent = '✦ Retry';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', load);
document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('gen-btn').addEventListener('click', generateAI);
</script>
</body>
</html>
